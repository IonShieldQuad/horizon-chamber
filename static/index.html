<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon Chamber</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<link rel="shortcut icon" type="image/x-icon" href="/static/horizon_icon.ico">
<style>
/* ── Reset & Base ────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  color: #e0e0e0;
  background: #0a0a0f;
}

/* ── Canvas (behind everything) ──────────────────────── */
#nebula {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  display: block;
}

/* ── Glassmorphism overlay panels ────────────────────── */
.glass {
  background: rgba(255, 255, 255, 0.14);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.16);
  border-radius: 16px;
  padding: 16px 20px;
  position: relative;
  z-index: 1;
}

/* ── Top bar ─────────────────────────────────────────── */
#top-bar {
  position: fixed;
  top: 20px;
  left: 50%;
  transform: translateX(-50%);
  width: min(600px, 90vw);
  z-index: 10;
  text-align: center;
}

#top-bar h1 {
  font-size: 1.1rem;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: 6px;
}

#main-quest {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.15);
  color: #e0e0e0;
  font-size: 1.4rem;
  font-weight: 300;
  text-align: center;
  padding: 8px 4px;
  outline: none;
  transition: border-color 0.3s;
}

#main-quest:focus { border-bottom-color: rgba(255,255,255,0.5); }
#main-quest::placeholder { color: rgba(255,255,255,0.2); }

/* ── Bottom section ──────────────────────────────────── */
#bottom-section {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  width: min(700px, 92vw);
  z-index: 10;
}

#chaos-input-area {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

#chaos-textarea {
  flex: 1;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  color: #e0e0e0;
  font-size: 0.95rem;
  font-family: inherit;
  padding: 12px 14px;
  resize: none;
  outline: none;
  min-height: 50px;
  max-height: 120px;
  transition: border-color 0.3s;
}

#chaos-textarea:focus { border-color: rgba(255,255,255,0.3); }
#chaos-textarea::placeholder { color: rgba(255,255,255,0.25); }

.btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  color: #e0e0e0;
  font-size: 0.95rem;
  font-family: inherit;
  padding: 12px 20px;
  cursor: pointer;
  transition: background 0.25s, border-color 0.25s, opacity 0.25s;
  white-space: nowrap;
}

.btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.25); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

#error-banner {
  display: none;
  margin-top: 10px;
  padding: 10px 14px;
  background: rgba(220, 50, 50, 0.2);
  border: 1px solid rgba(220, 50, 50, 0.4);
  border-radius: 10px;
  color: #ff8a8a;
  font-size: 0.85rem;
}

#loading-text {
  display: none;
  margin-top: 10px;
  font-size: 0.85rem;
  opacity: 0.6;
  text-align: center;
}

/* ── Cards container ─────────────────────────────────── */
#cards-container {
  display: none;
  margin-top: 14px;
  gap: 12px;
  justify-content: center;
}

.card-column {
  flex: 1;
  min-width: 0;
  padding: 10px;
  border-radius: 12px;
  min-height: 60px;
}

.card-column h3 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  opacity: 0.5;
  margin-bottom: 8px;
  text-align: center;
}

.card-column.column-now    { background: rgba(255, 215, 0, 0.10); }
.card-column.column-later  { background: rgba(74, 144, 226, 0.10); }
.card-column.column-trash  { background: rgba(160, 160, 160, 0.10); }

.chaos-card {
  background: rgba(255,255,255,0.11);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 10px;
  padding: 10px 12px;
  margin-bottom: 8px;
  font-size: 0.85rem;
  cursor: grab;
  transition: transform 0.15s, box-shadow 0.15s;
}

.chaos-card:active { cursor: grabbing; transform: scale(0.97); }
.chaos-card.dragging { opacity: 0.5; }

.chaos-card.card-now   { border-left: 3px solid #FFD700; }
.chaos-card.card-later { border-left: 3px solid #4A90E2; }
.chaos-card.card-trash { border-left: 3px solid #888; }

.card-column.drag-over {
  background: rgba(255,255,255,0.1);
  outline: 2px dashed rgba(255,255,255,0.2);
  outline-offset: -2px;
}

/* ── Sunrise button (fixed bottom-right) ─────────────── */
#sunrise-btn {
  position: fixed;
  bottom: auto;
  top: 90px;
  right: 30px;
  z-index: 20;
  background: rgba(255, 215, 0, 0.12);
  border: 1px solid rgba(255, 215, 0, 0.25);
  color: #FFD700;
  font-size: 0.85rem;
  padding: 12px 18px;
  border-radius: 30px;
  cursor: pointer;
  transition: background 0.3s, box-shadow 0.3s;
  font-family: inherit;
}

#sunrise-btn:hover {
  background: rgba(255, 215, 0, 0.22);
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.1);
}

#sunrise-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
  box-shadow: none;
}

/* ── Sunrise settings panel ──────────────────────────── */
#sunrise-settings {
  position: fixed;
  bottom: auto;
  top: 140px;
  right: 30px;
  z-index: 19;
  min-width: 200px;
  display: none;
  font-size: 0.8rem;
}

#sunrise-settings.visible { display: block; }

#sunrise-settings label {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
  cursor: pointer;
}

#sunrise-settings input[type="time"] {
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  color: #e0e0e0;
  font-size: 0.9rem;
  font-family: inherit;
  padding: 6px 10px;
  outline: none;
  width: 100%;
}

#sunrise-settings input[type="time"]:focus {
  border-color: rgba(255, 215, 0, 0.4);
}

#sunrise-settings .time-label {
  display: block;
  margin-bottom: 4px;
  opacity: 0.6;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

#sunrise-settings .settings-row {
  margin-bottom: 10px;
}

#sunrise-settings .settings-note {
  font-size: 0.7rem;
  opacity: 0.4;
  margin-top: 6px;
  text-align: center;
}

/* Gear icon next to sunrise button */
#sunrise-gear {
  position: fixed;
  bottom: auto;
  top: 98px;
  right: 155px;
  z-index: 21;
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.3);
  font-size: 1.1rem;
  cursor: pointer;
  padding: 4px;
  transition: color 0.3s, transform 0.3s;
  font-family: inherit;
}

#sunrise-gear:hover {
  color: rgba(255,255,255,0.6);
  transform: rotate(30deg);
}

#sunrise-gear.active {
  color: #FFD700;
  transform: rotate(60deg);
}

/* Toggle switch */
.toggle-switch {
  position: relative;
  display: inline-block;
  width: 36px;
  height: 20px;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.toggle-slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.15);
  border-radius: 20px;
  transition: background 0.3s;
}

.toggle-slider::before {
  content: "";
  position: absolute;
  height: 16px; width: 16px;
  left: 2px; bottom: 2px;
  background: #e0e0e0;
  border-radius: 50%;
  transition: transform 0.3s;
}

.toggle-switch input:checked + .toggle-slider {
  background: rgba(255, 215, 0, 0.5);
}

.toggle-switch input:checked + .toggle-slider::before {
  transform: translateX(16px);
}

/* ── Activity indicator (v0.2) ────────────────────────── */
.activity-pill {
  display: none;
  font-size: 0.7rem;
  opacity: 0.6;
  margin-left: 10px;
  vertical-align: middle;
  white-space: nowrap;
}
.activity-pill.visible { display: inline; }
.activity-pill.idle { opacity: 0.4; }
@keyframes pulse-opacity {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 0.3; }
}
.activity-pill.pulse {
  animation: pulse-opacity 2s ease-in-out infinite;
}
@media (prefers-reduced-motion: reduce) {
  .activity-pill.pulse { animation: none; }
}

/* ── Focus panel bars (v0.2) ─────────────────────────── */
.focus-bar-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
  cursor: pointer;
  font-size: 0.75rem;
}
.focus-bar-label {
  width: 60px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  opacity: 0.7;
  flex-shrink: 0;
}
.focus-bar-track {
  flex: 1;
  height: 16px;
  background: rgba(255,255,255,0.06);
  border-radius: 8px;
  overflow: hidden;
}
.focus-bar-fill {
  height: 100%;
  border-radius: 8px;
  transition: width 0.5s ease;
  min-width: 2px;
}
.focus-bar-fill.focus      { background: #FFD700; }
.focus-bar-fill.distraction { background: #e05050; }
.focus-bar-fill.neutral    { background: #888; }
.focus-bar-fill.idle       { background: #557; }
.focus-bar-fill.away       { background: #335; }
.focus-bar-pct {
  width: 40px;
  text-align: right;
  opacity: 0.5;
  flex-shrink: 0;
}
#focus-panel { display: none; }
#focus-panel.visible { display: block; }

/* ── Today's Focus panel ─────────────────────────────── */
#today-panel {
  position: fixed;
  top: 100px;
  right: 20px;
  z-index: 10;
  min-width: 160px;
  display: none;
  font-size: 0.8rem;
}

#today-panel.visible { display: block; }

#today-panel h3 {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  opacity: 0.4;
  margin-bottom: 6px;
}

#today-panel ul {
  list-style: none;
}

#today-panel li {
  padding: 4px 0;
  opacity: 0.7;
  font-size: 0.8rem;
}

/* ── Responsive ──────────────────────────────────────── */
@media (max-width: 600px) {
  #cards-container { flex-direction: column; }
  #bottom-section { bottom: 20px; width: 95vw; }
  #sunrise-btn { top: auto; bottom: 20px; right: 20px; font-size: 0.8rem; padding: 10px 14px; }
  #sunrise-gear { top: auto; bottom: 28px; right: 120px; }
  #sunrise-settings { top: auto; bottom: 70px; right: 20px; }
  #top-bar { top: 12px; width: 95vw; }
  #today-panel { display: none !important; }
}

@media (min-width: 601px) and (max-width: 900px) {
  #today-panel { min-width: 120px; right: 10px; }
  .focus-bar-label { width: 40px; }
  .focus-bar-pct { width: 30px; }
}

/* ── Reduced motion — respect OS preference ──────────── */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
  }
  #nebula { display: none; }
  .chaos-card { transition: none; }
  #sunrise-btn { transition: none; }
  .focus-bar-fill { transition: none; }
}

/* ── Today list view ──────────────────────────────────── */
#today-list-view {
  display: none; position: fixed; top: 90px; left: 50%; transform: translateX(-50%);
  width: min(600px, 90vw); z-index: 5; max-height: calc(100vh - 180px); overflow-y: auto;
  padding: 16px 20px;
}
#today-list-view.visible { display: block; }
#today-list-view h2 { font-size: 0.9rem; font-weight: 500; opacity: 0.6; margin-bottom: 12px; }
#today-list-view ol { list-style: decimal inside; padding: 0; }
#today-list-view li {
  padding: 8px 10px; margin-bottom: 4px; border-radius: 8px;
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.06);
  cursor: pointer; transition: background 0.2s; font-size: 0.9rem;
}
#today-list-view li:hover { background: rgba(255,255,255,0.08); }
#today-list-view li .list-checkbox { margin-right: 10px; cursor: pointer; }
#today-list-view li.done { opacity: 0.4; text-decoration: line-through; }
#today-list-view .list-meta { font-size: 0.7rem; opacity: 0.4; margin-left: 24px; }
#today-list-view .toggle-btn {
  background: transparent; border: 1px solid rgba(255,255,255,0.15);
  color: #e0e0e0; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 0.8rem;
  margin-bottom: 12px; transition: background 0.2s;
}
#today-list-view .toggle-btn:hover { background: rgba(255,255,255,0.1); }
/* ── Sunrise active — darken glass / cards so text stays readable ── */
body.sunrise-active .glass {
  background: rgba(0, 0, 0, 0.35) !important;
}
body.sunrise-active .chaos-card {
  background: rgba(0, 0, 0, 0.35) !important;
}
body.sunrise-active #today-panel {
  background: rgba(0, 0, 0, 0.35) !important;
}

/* ── Kanban Board ──────────────────────────────────────── */
#kanban-board {
  position: fixed; top: 140px; left: 50%; transform: translateX(-50%);
  width: min(1400px, 95vw); height: calc(100vh - 300px);
  z-index: 5; display: none; gap: 8px; padding: 12px;
  overflow-x: auto; overflow-y: hidden;
}
#kanban-board.visible { display: flex; }
.kanban-column {
  flex: 1; min-width: 180px; max-width: 280px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: 12px; padding: 10px;
  display: flex; flex-direction: column; max-height: 100%;
}
.kanban-column-header {
  font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em;
  opacity: 0.5; margin-bottom: 10px; text-align: center;
  padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.kanban-cards {
  flex: 1; overflow-y: auto; min-height: 60px; padding: 2px;
}
.kanban-cards::-webkit-scrollbar { width: 3px; }
.kanban-cards::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
.goal-card {
  background: rgba(255,255,255,0.13);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 10px; padding: 10px 12px; margin-bottom: 6px;
  font-size: 0.85rem; cursor: grab;
  transition: transform 0.15s, opacity 0.2s, box-shadow 0.15s;
  position: relative;
}
.goal-card:active { cursor: grabbing; transform: scale(0.97); }
.goal-card.dragging { opacity: 0.5; }
.goal-card.done { opacity: 0.4; text-decoration: line-through; border-color: rgba(100,255,100,0.2); }
.goal-card.overdue { border-left: 3px solid #ff6b6b; }
.goal-card.type-long_term { border-left: 3px solid #4A90E2; }
.goal-card.type-habit { border-left: 3px solid #4CAF50; }
.goal-card.type-maintenance { border-left: 3px solid #FF9800; }
.goal-card.color-blue { border-left-color: #4A90E2; }
.goal-card.color-green { border-left-color: #4CAF50; }
.goal-card.color-orange { border-left-color: #FF9800; }
.goal-card.color-purple { border-left-color: #9C27B0; }
.goal-card.color-gold { border-left-color: #FFD700; }
.goal-card.color-red { border-left-color: #f44336; }
.goal-card.color-teal { border-left-color: #009688; }
.goal-card.color-pink { border-left-color: #e91e63; }
.card-edit-input {
  width: 100%; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2);
  border-radius: 6px; color: #e0e0e0; font-size: 0.85rem;
  font-family: inherit; padding: 4px 6px; outline: none; margin-bottom: 4px;
}
.goal-card .card-meta { font-size: 0.65rem; opacity: 0.4; margin-top: 4px; }
.goal-card .card-actions { position: absolute; top: 6px; right: 8px; display: flex; gap: 4px; }
.goal-card .btn-split, .goal-card .btn-edit {
  background: transparent; border: none; color: rgba(255,255,255,0.3);
  font-size: 0.75rem; cursor: pointer; padding: 2px 4px; border-radius: 4px;
}
.goal-card .btn-split:hover, .goal-card .btn-edit:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.1); }
.kanban-column.drag-over { background: rgba(255,255,255,0.08); outline: 2px dashed rgba(255,255,255,0.2); outline-offset: -2px; }

/* ── Bottom strip (inbox / trash / capture) ────────────── */
#bottom-strip {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: min(1400px, 95vw); z-index: 5;
  display: none; flex-direction: row; gap: 10px; padding: 10px 12px;
  border-radius: 16px 16px 0 0;
}
#bottom-strip.visible { display: flex; }
.bottom-zone {
  flex: 1; min-height: 60px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  background: rgba(255,255,255,0.03); border-radius: 10px;
  border: 1px dashed rgba(255,255,255,0.08); padding: 8px;
  transition: background 0.2s, border-color 0.2s;
}
.bottom-zone:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.15); }
.bottom-zone .zone-icon { font-size: 1.3rem; opacity: 0.7; }
.bottom-zone .zone-label { font-size: 0.7rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 0.05em; }
.inbox-stack { position: relative; width: 100%; min-height: 50px; }
.inbox-shadow {
  position: absolute; top: 8px; left: 8px; right: 4px; bottom: -4px;
  background: rgba(255,255,255,0.03); border: 1px dashed rgba(255,255,255,0.06);
  border-radius: 10px;
}
.inbox-shadow + .inbox-shadow { top: 4px; left: 4px; right: 8px; bottom: 0; }
.inbox-blank {
  position: relative; z-index: 1; background: rgba(255,255,255,0.04) !important;
  border: 1px dashed rgba(255,255,255,0.15) !important; border-radius: 10px;
  opacity: 0.7; cursor: grab; margin-bottom: 0 !important; min-height: 44px;
  display: flex; align-items: center; justify-content: center;
}
.inbox-blank:hover { opacity: 1; background: rgba(255,255,255,0.07) !important; }
.inbox-blank .card-title { opacity: 0.5; font-style: italic; font-size: 0.8rem; }
#zone-capture {
  flex: 2; flex-direction: row; gap: 8px; padding: 6px 10px;
}
#zone-capture textarea {
  flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; color: #e0e0e0; font-size: 0.85rem;
  font-family: inherit; padding: 6px 8px; resize: none; outline: none; min-height: 32px;
}
#zone-capture textarea:focus { border-color: rgba(255,255,255,0.25); }
#zone-capture .btn-sm { font-size: 0.8rem; padding: 6px 12px; white-space: nowrap; }

/* ── Stats column ──────────────────────────────────────── */
.stats-column { min-width: 140px; max-width: 200px; font-size: 0.8rem; }
.stat-item { margin-bottom: 8px; }
.stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.4; }
.stat-value { font-size: 1.1rem; font-weight: 500; }
.nudge-text {
  font-size: 0.75rem; padding: 8px; border-radius: 8px;
  background: rgba(255,215,0,0.08); border: 1px solid rgba(255,215,0,0.15);
  margin-bottom: 8px; line-height: 1.4;
}
.nudge-text.alert { background: rgba(255,100,100,0.08); border-color: rgba(255,100,100,0.2); }
.nudge-text.suggestion { background: rgba(100,200,255,0.08); border-color: rgba(100,200,255,0.2); }
.nudge-dismiss { float: right; background: transparent; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 0.8rem; padding: 0 4px; }

/* ── Chaos inbox strip ─────────────────────────────────── */
#chaos-strip { display: block; flex-shrink: 0; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.06); }
#chaos-strip .chaos-toggle { font-size: 0.75rem; cursor: pointer; opacity: 0.5; padding: 4px 0; }
#chaos-strip .chaos-toggle:hover { opacity: 0.8; }
#chaos-strip .chaos-body { display: none; margin-top: 6px; }
#chaos-strip .chaos-body.open { display: flex; gap: 8px; align-items: center; }
#chaos-strip textarea {
  flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px; color: #e0e0e0; font-size: 0.85rem;
  font-family: inherit; padding: 8px 10px; resize: none; outline: none; min-height: 36px; max-height: 60px;
}
#chaos-strip textarea:focus { border-color: rgba(255,255,255,0.3); }

/* ── Quick-add inline ─────────────────────────────────── */
.quick-add-area { flex-shrink: 0; padding: 4px 2px; }

  width: 100%; text-align: left; opacity: 0.4; cursor: pointer;

/* ── Toast ─────────────────────────────────────────────── */
#toast-container { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 100; display: flex; flex-direction: column; gap: 6px; }
.toast {
  background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);

@keyframes toast-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.toast .toast-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; color: #e0e0e0; font-size: 0.8rem; padding: 4px 10px; cursor: pointer; white-space: nowrap; }

.loading-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.15); border-top-color: #e0e0e0; border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

       ondragover="allowDrop(event)" ondrop="trashTask(event)">

    </label>

  <div class="settings-note">In-memory schedule • resets on restart</div>

<button id="sunrise-gear" aria-label="Sunrise settings">⚙️</button>

<script>
/* ═══════════════════════════════════════════════════════════
   GLOBALS
   ═══════════════════════════════════════════════════════════ */

const canvas = document.getElementById('nebula');
let ctx = null;
try {
  ctx = canvas.getContext('2d');
} catch (err) {
  console.warn('Canvas 2D context not available:', err);
}

let canvasW, canvasH;
let stars = [];
const STAR_COUNT = 200;
const MAX_FRAME_MS = 50;   // if frame takes >50ms, reduce particle count

// Current canvas background color (RGB)
let bgColor = { r: 10, g: 10, b: 15 };
let targetColor = { r: 10, g: 10, b: 15 };  // fallback #0a0a0f

// Sunrise state
let sunriseActive = false;
let sunriseStartTime = 0;

// Canvas available flag
let canvasOk = ctx !== null;

/* ═══════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════ */

function hexToRgb(hex) {
  const val = parseInt(hex.replace('#', ''), 16);
  return { r: (val >> 16) & 255, g: (val >> 8) & 255, b: val & 255 };
}

function lerpChannel(a, b, t) { return Math.round(a + (b - a) * t); }

function lerpColor(a, b, t) {
  return {
    r: lerpChannel(a.r, b.r, t),
    g: lerpChannel(a.g, b.g, t),
    b: lerpChannel(a.b, b.b, t),
  };
}

function rgbToStyle(c) {
  return `rgb(${c.r}, ${c.g}, ${c.b})`;
}

/* ═══════════════════════════════════════════════════════════
   CANVAS SETUP
   ═══════════════════════════════════════════════════════════ */

function resizeCanvas() {
  canvasW = canvas.width = window.innerWidth;
  canvasH = canvas.height = window.innerHeight;
}

window.addEventListener('resize', resizeCanvas);

/* ═══════════════════════════════════════════════════════════
   STARS
   ═══════════════════════════════════════════════════════════ */

function createStar() {
  return {
    x: Math.random() * canvasW,
    y: Math.random() * canvasH,
    radius: 0.5 + Math.random() * 2,
    speed: 0.1 + Math.random() * 0.4,
    alpha: 0.3 + Math.random() * 0.7,
  };
}

function initStars(count) {
  stars = [];
  for (let i = 0; i < count; i++) {
    stars.push(createStar());
  }
}

/* ═══════════════════════════════════════════════════════════
   ANIMATION LOOP
   ═══════════════════════════════════════════════════════════ */

let lastFrameTime = 0;
let animActive = true;
let currentStarCount = STAR_COUNT;

function animate(timestamp) {
  if (!animActive) return;
  if (!canvasOk) return;

  // Track frame performance
  if (lastFrameTime > 0) {
    const delta = timestamp - lastFrameTime;
    if (delta > MAX_FRAME_MS && currentStarCount > 100) {
      currentStarCount = 100;
      initStars(currentStarCount);
    }
  }
  lastFrameTime = timestamp;

  // Clear canvas with background color
  ctx.fillStyle = rgbToStyle(bgColor);
  ctx.fillRect(0, 0, canvasW, canvasH);

  // Draw stars
  for (const star of stars) {
    star.y -= star.speed;
    if (star.y + star.radius < 0) {
      star.y = canvasH + star.radius;
      star.x = Math.random() * canvasW;
    }

    ctx.beginPath();
    ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
    ctx.fill();
  }

  requestAnimationFrame(animate);
}

/* ═══════════════════════════════════════════════════════════
   COLOR INTERPOLATION
   ═══════════════════════════════════════════════════════════ */

let colorLerpActive = false;
let colorLerpStart = 0;
let colorLerpDuration = 5000;  // 5 seconds
let colorLerpFrom = { r: 0, g: 0, b: 0 };
let colorLerpTo = { r: 10, g: 10, b: 15 };

function startColorLerp(from, to, duration) {
  colorLerpFrom = from;
  colorLerpTo = to;
  colorLerpDuration = duration;
  colorLerpActive = true;
  colorLerpStart = performance.now();
}

function updateColorLerp() {
  if (!colorLerpActive) return;

  const elapsed = performance.now() - colorLerpStart;
  const t = Math.min(elapsed / colorLerpDuration, 1);
  bgColor = lerpColor(colorLerpFrom, colorLerpTo, t);

  if (t >= 1) {
    bgColor = { ...colorLerpTo };
    colorLerpActive = false;
  }
}

// Patch the animate loop to also update color lerp
const _origAnimate = animate;
animate = function(timestamp) {
  updateColorLerp();
  _origAnimate(timestamp);
};

/* ═══════════════════════════════════════════════════════════
   FETCH: /api/time_color
   ═══════════════════════════════════════════════════════════ */

async function fetchTimeColor() {
  try {
    const res = await fetch('/api/time_color');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    targetColor = hexToRgb(data.hex);
  } catch (err) {
    console.warn('Failed to fetch /api/time_color, using fallback:', err);
    targetColor = { r: 10, g: 10, b: 15 };
  }

  // Start 5-second interpolation from current bg to target
  startColorLerp({ ...bgColor }, targetColor, 5000);
}

/* ═══════════════════════════════════════════════════════════
   FETCH: /api/today
   ═══════════════════════════════════════════════════════════ */

async function fetchToday() {
  try {
    const res = await fetch('/api/today');
    if (!res.ok) return;
    const data = await res.json();
    const list = document.getElementById('today-list');
    const panel = document.getElementById('today-panel');
    list.innerHTML = '';
    if (data.items && data.items.length > 0) {
      data.items.forEach(text => {
        if (typeof text !== 'string') return;  // skip non-string entries
        const li = document.createElement('li');
        li.textContent = text;
        list.appendChild(li);
      });
      panel.classList.add('visible');
    } else {
      panel.classList.remove('visible');
    }
  } catch (err) {
    console.warn('Failed to fetch /api/today:', err);
  }
}

/* ═══════════════════════════════════════════════════════════
   MAIN QUEST (localStorage)
   ═══════════════════════════════════════════════════════════ */

const questInput = document.getElementById('main-quest');

function loadQuest() {
  const saved = localStorage.getItem('horizon_main_quest');
  if (saved) questInput.value = saved;
}

function saveQuest() {
  localStorage.setItem('horizon_main_quest', questInput.value);
}

questInput.addEventListener('input', saveQuest);
questInput.addEventListener('change', saveQuest);

/* ═══════════════════════════════════════════════════════════
   CHAOS TAMER
   ═══════════════════════════════════════════════════════════ */

const textarea = document.getElementById('chaos-textarea');
const tameBtn = document.getElementById('tame-btn');
const errorBanner = document.getElementById('error-banner');
const loadingText = document.getElementById('loading-text');
const cardsContainer = document.getElementById('cards-container');

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.style.display = 'block';
}

function hideError() {
  errorBanner.style.display = 'none';
}

if (tameBtn) tameBtn.addEventListener('click', async () => {
  hideError();
  const raw = textarea.value.trim();
  if (!raw) {
    showError('Nothing to tame!');
    return;
  }

  tameBtn.disabled = true;
  loadingText.style.display = 'block';

  try {
    const res = await fetch('/api/classify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ raw_text: raw }),
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({ detail: `HTTP ${res.status}` }));
      throw new Error(errData.detail || `Server error (${res.status})`);
    }

    const data = await res.json();
    renderCards(data);
  } catch (err) {
    showError('Classification failed. Check your API key or try again.');
    console.error('Classification error:', err);
  } finally {
    tameBtn.disabled = false;
    loadingText.style.display = 'none';
  }
});

/* ── Draggable Cards ──────────────────────────────────── */

function renderCards(data) {
  cardsContainer.style.display = 'flex';
  cardsContainer.innerHTML = '';

  const columns = [
    { key: 'now',   label: 'Now',   cssClass: 'column-now' },
    { key: 'later', label: 'Later', cssClass: 'column-later' },
    { key: 'trash', label: 'Trash', cssClass: 'column-trash' },
  ];

  for (const col of columns) {
    const div = document.createElement('div');
    div.className = `card-column ${col.cssClass}`;
    div.dataset.column = col.key;

    const h3 = document.createElement('h3');
    h3.textContent = col.label;
    div.appendChild(h3);

    const items = data[col.key] || [];
    for (const text of items) {
      const card = document.createElement('div');
      card.className = `chaos-card card-${col.key}`;
      card.draggable = true;
      card.textContent = text;
      card.dataset.category = col.key;

      // Drag start
      card.addEventListener('dragstart', (e) => {
        e.dataTransfer.setData('text/plain', text);
        e.dataTransfer.effectAllowed = 'move';
        card.classList.add('dragging');
      });

      card.addEventListener('dragend', () => {
        card.classList.remove('dragging');
        document.querySelectorAll('.card-column').forEach(c => c.classList.remove('drag-over'));
      });

      div.appendChild(card);
    }

    // Drop zone
    div.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      div.classList.add('drag-over');
    });

    div.addEventListener('dragleave', () => {
      div.classList.remove('drag-over');
    });

    div.addEventListener('drop', (e) => {
      e.preventDefault();
      div.classList.remove('drag-over');

      const dragging = document.querySelector('.chaos-card.dragging');
      if (dragging && div !== dragging.parentElement) {
        // Clone the card, remove old, add to new column
        const text = dragging.textContent;
        const colKey = div.dataset.column;
        const newCard = document.createElement('div');
        newCard.className = `chaos-card card-${colKey}`;
        newCard.draggable = true;
        newCard.textContent = text;
        newCard.dataset.category = colKey;

        // Re-bind drag events
        newCard.addEventListener('dragstart', (ev) => {
          ev.dataTransfer.setData('text/plain', text);
          ev.dataTransfer.effectAllowed = 'move';
          newCard.classList.add('dragging');
        });
        newCard.addEventListener('dragend', () => {
          newCard.classList.remove('dragging');
          document.querySelectorAll('.card-column').forEach(c => c.classList.remove('drag-over'));
        });

        dragging.remove();
        div.appendChild(newCard);
      }
    });

    cardsContainer.appendChild(div);
  }
}

/* ═══════════════════════════════════════════════════════════
   SUNRISE
   ═══════════════════════════════════════════════════════════ */

const sunriseBtn = document.getElementById('sunrise-btn');
const SUNRISE_DURATION = 60000;  // 60 seconds
const SUNRISE_GOLD = { r: 255, g: 215, b: 0 };

sunriseBtn.addEventListener('click', () => {
  startSunriseSequence();
});

/* ═══════════════════════════════════════════════════════════
   AUTO-SUNRISE SCHEDULER
   ═══════════════════════════════════════════════════════════ */

const sunriseGear = document.getElementById('sunrise-gear');
const sunriseSettings = document.getElementById('sunrise-settings');
const sunriseToggle = document.getElementById('sunrise-toggle');
const sunriseTimeInput = document.getElementById('sunrise-time');

let autoSunrisePollId = null;
let autoSunriseLocalEnabled = false;
let autoSunriseLocalTime = '07:00';

// ── Settings panel toggle ──────────────────────────────

sunriseGear.addEventListener('click', () => {
  sunriseSettings.classList.toggle('visible');
  sunriseGear.classList.toggle('active');
  if (sunriseSettings.classList.contains('visible')) {
    loadScheduleFromServer();
  }
});

// ── Load schedule from server ──────────────────────────

async function loadScheduleFromServer() {
  try {
    const res = await fetch('/api/sunrise/schedule');
    if (!res.ok) return;
    const data = await res.json();
    sunriseToggle.checked = data.enabled;
    sunriseTimeInput.value = data.time;
    autoSunriseLocalEnabled = data.enabled;
    autoSunriseLocalTime = data.time;
    saveAutoSunriseLocal();
  } catch (err) {
    console.warn('Failed to load sunrise schedule, using localStorage:', err);
    loadAutoSunriseLocal();
  }
}

// ── Save schedule to server ────────────────────────────

async function saveScheduleToServer(enabled, time) {
  try {
    const res = await fetch('/api/sunrise/schedule', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled, time }),
    });
    if (!res.ok) {
      console.warn('Failed to save sunrise schedule:', await res.text());
    }
  } catch (err) {
    console.warn('Failed to save sunrise schedule:', err);
  }
}

// ── UI change handlers ─────────────────────────────────

sunriseToggle.addEventListener('change', () => {
  const enabled = sunriseToggle.checked;
  const time = sunriseTimeInput.value || '07:00';
  autoSunriseLocalEnabled = enabled;
  autoSunriseLocalTime = time;
  saveScheduleToServer(enabled, time);
  saveAutoSunriseLocal();
});

sunriseTimeInput.addEventListener('change', () => {
  const enabled = sunriseToggle.checked;
  const time = sunriseTimeInput.value || '07:00';
  autoSunriseLocalEnabled = enabled;
  autoSunriseLocalTime = time;
  saveScheduleToServer(enabled, time);
  saveAutoSunriseLocal();
});

// ── localStorage fallback ──────────────────────────────

function saveAutoSunriseLocal() {
  try {
    localStorage.setItem('horizon_auto_sunrise', JSON.stringify({
      enabled: autoSunriseLocalEnabled,
      time: autoSunriseLocalTime,
    }));
  } catch (err) {
    console.warn('localStorage quota exceeded for auto-sunrise:', err);
  }
}

function loadAutoSunriseLocal() {
  try {
    const saved = localStorage.getItem('horizon_auto_sunrise');
    if (saved) {
      const parsed = JSON.parse(saved);
      if (typeof parsed.enabled === 'boolean') {
        autoSunriseLocalEnabled = parsed.enabled;
        sunriseToggle.checked = parsed.enabled;
      }
      if (typeof parsed.time === 'string') {
        autoSunriseLocalTime = parsed.time;
        sunriseTimeInput.value = parsed.time;
      }
    }
  } catch (err) {
    console.warn('Failed to load auto-sunrise from localStorage:', err);
  }
}

// ── Polling: check server for sunrise trigger ──────────

async function checkSunriseTrigger() {
  try {
    const res = await fetch('/api/sunrise/schedule');
    if (!res.ok) return;
    const data = await res.json();
    if (data.sunrise_triggered) {
      console.log('Auto-sunrise triggered by server!');
      startSunriseSequence();
    }
  } catch (err) {
    // Server unreachable — fall back to local time check
    checkLocalSunriseTime();
  }
}

// ── Local time fallback ────────────────────────────────

function checkLocalSunriseTime() {
  if (!autoSunriseLocalEnabled) return;
  const now = new Date();
  const currentMinutes = now.getHours() * 60 + now.getMinutes();
  const [h, m] = autoSunriseLocalTime.split(':').map(Number);
  const targetMinutes = h * 60 + m;

  if (currentMinutes === targetMinutes) {
    const todayKey = now.toDateString();
    const lastTrigger = localStorage.getItem('horizon_last_sunrise_date');
    if (lastTrigger !== todayKey) {
      try {
        localStorage.setItem('horizon_last_sunrise_date', todayKey);
      } catch (err) {
        console.warn('localStorage quota exceeded:', err);
      }
      console.log('Auto-sunrise triggered by local time!');
      startSunriseSequence();
    }
  }
}

// ── Start sunrise (reusable for both manual and auto) ──

function startSunriseSequence() {
  if (sunriseActive) return;
  sunriseActive = true;
  sunriseBtn.disabled = true;
  document.body.classList.add('sunrise-active');

  // Countdown timer — updates button text each second
  let remainingSeconds = Math.ceil(SUNRISE_DURATION / 1000);
  sunriseBtn.textContent = `☀️ ${remainingSeconds}s`;
  const countdownId = setInterval(() => {
    remainingSeconds--;
    if (remainingSeconds > 0) {
      sunriseBtn.textContent = `☀️ ${remainingSeconds}s`;
    }
  }, 1000);

  // Shared cleanup (called from both success and error paths)
  function cleanupSunrise() {
    clearInterval(countdownId);
    sunriseActive = false;
    sunriseBtn.disabled = false;
    sunriseBtn.textContent = '☀️ Start Sunrise';
    document.body.classList.remove('sunrise-active');
    fetchTimeColor();  // restore time-aware background
  }

  // 1. Visual: lerp to gold over 60s
  const startBg = { ...bgColor };
  startColorLerp(startBg, SUNRISE_GOLD, SUNRISE_DURATION);

  // 2. Audio: Web Audio API sine wave 440Hz → 880Hz
  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();

    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
    oscillator.frequency.linearRampToValueAtTime(880, audioCtx.currentTime + SUNRISE_DURATION / 1000);

    const fadeInEnd = audioCtx.currentTime + 2;
    const fadeOutStart = audioCtx.currentTime + (SUNRISE_DURATION / 1000) - 5;
    const endTime = audioCtx.currentTime + SUNRISE_DURATION / 1000;

    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.15, fadeInEnd);
    gainNode.gain.setValueAtTime(0.15, fadeOutStart);
    gainNode.gain.linearRampToValueAtTime(0, endTime);

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    oscillator.start(audioCtx.currentTime);
    oscillator.stop(endTime);

    setTimeout(() => {
      cleanupSunrise();
      audioCtx.close().catch(() => {});
    }, SUNRISE_DURATION + 200);
  } catch (err) {
    console.warn('Web Audio not available for auto-sunrise:', err);
    setTimeout(cleanupSunrise, SUNRISE_DURATION + 200);
  }
}

const activityIndicator = document.getElementById('activity-indicator');
const focusBars = document.getElementById('focus-bars');
let activityPollId = null;

// ── Bridge detection ──────────────────────────────────
const hasJsApi = typeof pywebview !== 'undefined' && pywebview.api;

// ── Update activity indicator ─────────────────────────
function updateActivityIndicator(data) {
  if (!activityIndicator) return;
  if (!data || data.app_name === 'unknown') {
    activityIndicator.classList.remove('visible');
    return;
  }

  let text = '\uD83D\uDDA5\uFE0F ';
  // Use window title for better readability
  if (data.window_title) {
    text += data.window_title.substring(0, 30);
  } else {
    text += data.app_name;
  }

  if (data.idle_seconds > 60) {
    const mins = Math.floor(data.idle_seconds / 60);
    text = '\uD83D\uDCA4 Away (' + mins + 'm)';
    activityIndicator.classList.add('idle');
  } else {
    activityIndicator.classList.remove('idle');
  }

  activityIndicator.textContent = text;
  activityIndicator.classList.add('visible');
  activityIndicator.classList.add('pulse');
  setTimeout(() => activityIndicator.classList.remove('pulse'), 2000);
}

// ── Update focus panel ────────────────────────────────
function updateFocusPanel(data) {
  if (!focusBars) return;
  focusBars.innerHTML = '';

  if (!data || !data.blocks || data.blocks.length === 0) {
    document.getElementById('focus-panel').classList.remove('visible');
    // Show placeholder when no activity data
    const emptyMsg = document.createElement('div');
    emptyMsg.style.cssText = 'opacity:0.4;font-size:0.75rem;padding:8px 0;';
    emptyMsg.textContent = 'No activity data yet. Start using your computer!';
    focusBars.appendChild(emptyMsg);
    return;
  }

  document.getElementById('focus-panel').classList.add('visible');

  for (const block of data.blocks) {
    const row = document.createElement('div');
    row.className = 'focus-bar-row';
    row.dataset.appName = block.app_name;

    const label = document.createElement('span');
    label.className = 'focus-bar-label';
    label.textContent = block.app_name.replace(/\.exe$/i, '').substring(0, 10);

    const track = document.createElement('div');
    track.className = 'focus-bar-track';

    const fill = document.createElement('div');
    fill.className = 'focus-bar-fill focus';
    fill.style.width = Math.max(block.percentage, 2) + '%';
    fill.style.backgroundColor = getCategoryColor(block.category || 'focus');

    const pct = document.createElement('span');
    pct.className = 'focus-bar-pct';
    pct.textContent = block.percentage + '%';

    track.appendChild(fill);
    row.appendChild(label);
    row.appendChild(track);
    row.appendChild(pct);

    row.addEventListener('click', () => {
      toggleAppCategory(row.dataset.appName);
    });

    focusBars.appendChild(row);
  }

  // Hide the old today-list if focus panel is shown
  const todayList = document.getElementById('today-list');
  if (todayList) todayList.style.display = 'none';
}

function getCategoryColor(category) {
  const colors = {
    'focus': '#FFD700',
    'distraction': '#e05050',
    'neutral': '#888',
    'idle': '#557',
    'away': '#335'
  };
  return colors[category] || '#FFD700';
}

async function toggleAppCategory(appName) {
  try {
    // Simple cycle: focus -> distraction -> neutral -> focus
    const res = await fetch('/api/activity/categories');
    const data = await res.json();
    const existing = data.categories.find(c => c.app_name === appName);
    const cycle = { 'focus': 'distraction', 'distraction': 'neutral', 'neutral': 'focus', 'idle': 'focus', 'away': 'focus' };
    const nextCat = cycle[existing ? existing.category : 'focus'] || 'focus';
    await fetch('/api/activity/categories', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ app_name: appName, category: nextCat })
    });
    // Refresh focus panel
    await fetchAndDisplayFocusSummary();
  } catch (err) {
    console.warn('Failed to toggle app category:', err);
  }
}

async function fetchAndDisplayFocusSummary() {
  try {
    const res = await fetch('/api/activity/summary?period=today');
    if (!res.ok) return;
    const data = await res.json();
    updateFocusPanel(data);
  } catch (err) {
    console.warn('Failed to fetch focus summary:', err);
  }
}

// ── Polling fallback ──────────────────────────────────
async function fetchActivityNow() {
  try {
    const res = await fetch('/api/activity/now');
    if (!res.ok) return;
    const data = await res.json();
    updateActivityIndicator(data);
  } catch (err) {
    console.warn('Failed to fetch activity:', err);
  }
}

function startActivityPolling() {
  if (activityPollId) clearInterval(activityPollId);
  activityPollId = setInterval(fetchActivityNow, 30000);
  fetchActivityNow();
}

// ── SSE client ────────────────────────────────────────
let activitySSE = null;

function startActivityTracking() {
  if (hasJsApi) {
    // Desktop bridge — try bridge first, fall back to SSE
    console.log('PyWebView bridge detected — using JS API');
    startActivityPolling();
    return;
  }

  try {
    activitySSE = new EventSource('/api/activity/stream');

    activitySSE.addEventListener('activity', (e) => {
      try {
        const data = JSON.parse(e.data);
        updateActivityIndicator(data);
        // Refresh focus panel periodically (not on every activity event)
      } catch (err) {
        console.warn('Failed to parse activity SSE data:', err);
      }
    });

    activitySSE.addEventListener('error', () => {
      // SSE disconnected — fall back to polling
      activitySSE.close();
      activitySSE = null;
      console.log('SSE disconnected — falling back to polling');
      startActivityPolling();
    });
  } catch (err) {
    console.warn('SSE not available — using polling:', err);
    startActivityPolling();
  }

  // Poll focus summary every 30s alongside SSE
  setInterval(fetchAndDisplayFocusSummary, 30000);
  // Also fetch on initial load
  setTimeout(fetchAndDisplayFocusSummary, 2000);
}

// ── Start polling on page load ─────────────────────────

function startAutoSunrisePolling() {
  // Load schedule from server or localStorage
  loadScheduleFromServer();

  // Poll server every 15s for sunrise trigger
  autoSunrisePollId = setInterval(checkSunriseTrigger, 15000);

  // Also check local time every 30s as backup
  setInterval(checkLocalSunriseTime, 30000);
}

// KANBAN BOARD FUNCTIONS
async function fetchBoard() {
  try { const r = await fetch('/api/board'); return r.ok ? await r.json() : null; } catch(e) { return null; }
}
function escapeHtml(s) {
  var d = document.createElement('div'); d.textContent = s; return d.innerHTML;
}
function renderKanban(board) {
  if (!board) return;
  var cols = {today:'col-today',doing:'col-doing',done:'col-done',overdue:'col-overdue'};
  for (var k in cols) {
    var col = document.getElementById(cols[k]); if (!col) continue;
    var cards = board.columns[k] || [];
    col.innerHTML = cards.map(function(t) {
      var color = localStorage.getItem('card_color_'+t.id) || '';
      var cls = 'goal-card' + (t.status==='done'?' done':'') + (t.goal_type?' type-'+t.goal_type:'') + (color?' color-'+color:'');
      var meta = t.goal_title ? '<div class="card-meta">'+escapeHtml(t.goal_title)+'</div>' : '';
      var actions = '<span class="card-actions">' +
        '<button class="btn-split" title="Color" onclick="event.stopPropagation();cycleCardColor(event,'+t.id+')">🎨</button>' +
        '<button class="btn-split" title="Split" onclick="event.stopPropagation();splitTask('+t.id+')">✂</button>' +
        '</span>';
      return '<div class="'+cls+'" draggable="true" data-task-id="'+t.id+'" data-status="'+t.status+'" ondragstart="dragTask(event,'+t.id+',&quot;'+t.status+'&quot;)" onclick="editCard(event,'+t.id+')">'+actions+'<div class="card-title">'+escapeHtml(t.title)+'</div>'+meta+'</div>';
    }).join('');
  }
  var statsEl = document.getElementById('stats-content');
  if (statsEl && board.stats) {
    var s = board.stats;
    var h = '<div class="stat-item"><div class="stat-label">Done</div><div class="stat-value">'+s.done+'/'+s.total_tasks+'</div></div>';
    h += '<div class="stat-item"><div class="stat-label">Rate</div><div class="stat-value">'+s.completion_rate+'%</div></div>';
    statsEl.innerHTML = h;
  }
  document.getElementById('kanban-board').classList.add('visible');
  var strip = document.getElementById('bottom-strip');
  if (strip) strip.classList.add('visible');
}
async function editCard(e, id) {
  var card = e.currentTarget;
  var titleEl = card.querySelector('.card-title');
  if (!titleEl || card.querySelector('input')) return;
  var inp = document.createElement('input');
  inp.className = 'card-edit-input';
  inp.value = titleEl.textContent;
  inp.onblur = function() { saveCardTitle(id, inp.value, card, titleEl); };
  inp.onkeydown = function(ev) {
    if (ev.key==='Enter') { ev.preventDefault(); inp.blur(); }
    if (ev.key==='Escape') { titleEl.style.display=''; inp.remove(); }
  };
  titleEl.style.display = 'none';
  card.insertBefore(inp, titleEl);
  inp.focus(); inp.select();
}
function saveCardTitle(id, newTitle, card, titleEl) {
  var inp = card.querySelector('input');
  if (!inp) return;
  var title = inp.value.trim() || titleEl.textContent;
  inp.remove(); titleEl.style.display = ''; titleEl.textContent = title;
  fetch('/api/tasks/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:title})}).then(function(){refreshBoard();}).catch(function(){});
}
var CARD_COLORS = ['blue','green','orange','purple','gold','red','teal','pink'];
function cycleCardColor(e, id) {
  e.stopPropagation();
  var cur = localStorage.getItem('card_color_'+id) || '';
  var idx = CARD_COLORS.indexOf(cur);
  localStorage.setItem('card_color_'+id, CARD_COLORS[(idx+1)%CARD_COLORS.length]);
  refreshBoard();
}
async function splitTask(id) {
  try { var r = await fetch('/api/tasks/'+id+'/split',{method:'POST'}); if(r.ok){showToast('Split!');refreshBoard();} else {showToast('AI not available');} } catch(e) {}
}
async function refreshBoard() {
  var board = await fetchBoard();
  if (board) {
    try { board.analysis = await (await fetch('/api/analysis')).json(); } catch(e) {}
  }
  renderKanban(board);
}
// ── Drag-and-drop between kanban columns ───────────────
var dragData = null;
function dragTask(e, taskId, status) {
  dragData = { id: taskId, from: status };
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', String(taskId));
}
async function dragNewCard(e) {
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', 'new');
  try {
    var gr = await fetch('/api/goals',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:'New card',type:'long_term'})});
    if(gr.ok){
      var goal = await gr.json();
      var tr = await fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goal_id:goal.id,title:'New card'})});
      if(tr.ok){ var task = await tr.json(); dragData = { id: task.id, from: 'inbox', newCard: true }; }
    }
  } catch(e) {}
}
function onInboxDragEnd(e) {
  if (dragData && dragData.newCard && !dragData.consumed) {
    fetch('/api/tasks/'+dragData.id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'skipped'})}).catch(function(){});
  }
  dragData = null;
  renderInboxCard();
}
function renderInboxCard() {
  var s = document.getElementById('inbox-stack');
  if(!s) return;
  s.innerHTML = '<div class="inbox-shadow"></div><div class="inbox-shadow"></div>' +
    '<div id="inbox-card" class="goal-card inbox-blank" draggable="true" ' +
    'ondragstart="dragNewCard(event)" ondragend="onInboxDragEnd(event)">' +
    '<div class="card-title">New card</div></div>';
}
function allowDrop(e) { e.preventDefault(); }
async function dropTask(e, newStatus) {
  e.preventDefault();
  if (!dragData) return;
  var taskId = dragData.id;
  var fromStatus = dragData.from;
  dragData.consumed = true;
  try {
    var dropPayload = {status: newStatus};
    // When dropping to Today (pending) or Doing, also carry the task to today's date
    if (newStatus === 'pending' || newStatus === 'doing') {
      var d = new Date();
      var y = d.getFullYear();
      var m = String(d.getMonth()+1).padStart(2,'0');
      var day = String(d.getDate()).padStart(2,'0');
      dropPayload.date = y+'-'+m+'-'+day;
    }
    await fetch('/api/tasks/'+taskId,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(dropPayload)});
    refreshBoard();
  } catch(err) { console.warn('Drop failed:', err); }
  dragData = null;
}
async function trashTask(e) {
  e.preventDefault();
  if (!dragData) return;
  dragData.consumed = true;
  var taskId = dragData.id;
  try {
    await fetch('/api/tasks/'+taskId,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'skipped'})});
    showToast('Trashed!');
    refreshBoard();
  } catch(err) { console.warn('Trash failed:', err); }
  dragData = null;
}
async function captureThought() {
  var inp = document.getElementById('capture-input');
  if (!inp || !inp.value.trim()) return;
  try {
    var r = await fetch('/api/classify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({raw_text:inp.value.trim()})});
    if(r.ok){inp.value='';showToast('Tamed!');refreshBoard();} else {showToast('AI failed');}
  } catch(e) { showToast('Failed'); }
}
function showToast(msg, undoCallback) {
  var c = document.getElementById('toast-container'); if(!c) return;
  var t = document.createElement('div'); t.className='toast';
  t.innerHTML = '<span>' + escapeHtml(msg) + '</span>';
  if (undoCallback) {
    var btn = document.createElement('button');
    btn.className = 'toast-btn';
    btn.textContent = 'Undo';
    btn.onclick = function() { undoCallback(); t.remove(); };
    t.appendChild(btn);
  }
  c.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(function(){t.remove();},300); }, 4000);
}

// TODAY LIST VIEW
function toggleListView() {
  var board = document.getElementById('kanban-board');
  var list = document.getElementById('today-list-view');
  board.classList.toggle('visible');
  list.classList.toggle('visible');
  if (list.classList.contains('visible')) refreshListView();
}
async function refreshListView() {
  try {
    var r = await fetch('/api/today');
    if (!r.ok) return;
    var data = await r.json();
    var ol = document.getElementById('today-list-items');
    ol.innerHTML = '';
    if (data.tasks && data.tasks.length > 0) {
      data.tasks.forEach(function(t) {
        var li = document.createElement('li');
        li.className = t.status === 'done' ? 'done' : '';
        li.innerHTML = '<span class="list-checkbox" onclick="event.stopPropagation();toggleListItem(' + t.id + ',this)">' + (t.status === 'done' ? '&#x2611;' : '&#x2610;') + '</span>' + escapeHtml(t.title) + '<div class="list-meta">' + (t.goal_title ? escapeHtml(t.goal_title) + ' &middot; ' : '') + t.status + '</div>';
        li.onclick = function() { toggleListItem(t.id, this.querySelector('.list-checkbox')); };
        ol.appendChild(li);
      });
    } else {
      ol.innerHTML = '<li style="opacity:0.4;list-style:none">No tasks for today. Create a goal!</li>';
    }
  } catch(e) {}
}
async function toggleListItem(taskId, checkboxEl) {
  try {
    var isDone = checkboxEl.innerHTML.indexOf('2611') >= 0;
    var newStatus = isDone ? 'pending' : 'done';
    await fetch('/api/tasks/' + taskId, {method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:newStatus})});
    refreshListView();
    refreshBoard();
  } catch(e) {}
}
