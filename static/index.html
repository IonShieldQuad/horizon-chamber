<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Horizon Chamber</title>
<link rel="icon" type="image/png" href="/static/favicon.png">
<link rel="shortcut icon" type="image/x-icon" href="/static/horizon_icon.ico">
<style>
/* ═══════════════════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --glass-bg: rgba(255, 255, 255, 0.14);
  --glass-border: rgba(255, 255, 255, 0.16);
  --zone-bg: rgba(10, 10, 17, 0.65);
  --zone-border: rgba(255, 255, 255, 0.08);
  --tab-active-bg: rgba(255, 255, 255, 0.10);
  --tab-hover-bg: rgba(255, 255, 255, 0.05);
  --tab-inactive: rgba(255, 255, 255, 0.35);
  --text-primary: #e0e0e0;
  --text-muted: rgba(255, 255, 255, 0.45);
  --accent-gold: #FFD700;
  --accent-blue: #4A90E2;
  --accent-green: #4CAF50;
  --accent-orange: #FF9800;
  --accent-red: #f44336;
  --radius-lg: 12px;
  --radius-md: 8px;
  --radius-sm: 6px;
  --font: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: var(--font);
  color: var(--text-primary);
  background: #0a0a0f;
}

/* ═══════════════════════════════════════════════════════════
   CANVAS (behind everything)
   ═══════════════════════════════════════════════════════════ */
#nebula {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  display: block;
}

/* ═══════════════════════════════════════════════════════════
   ZONE LAYOUT — 4 corners around center canvas
   ═══════════════════════════════════════════════════════════ */
.zone {
  position: fixed;
  z-index: 5;
  display: flex;
  flex-direction: column;
  background: var(--zone-bg);
  backdrop-filter: blur(14px) saturate(120%);
  -webkit-backdrop-filter: blur(14px) saturate(120%);
  border: 1px solid var(--zone-border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1),
              opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1),
              max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
              max-width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
}

/* Zone positions */
.zone.zone-tl { top: 12px; left: 12px; width: 380px; max-height: 42vh; }
.zone.zone-tr { top: 12px; right: 12px; width: 320px; max-height: 42vh; }
.zone.zone-bl { bottom: 12px; left: 12px; width: min(650px, 60vw); max-height: 48vh; }
.zone.zone-br { bottom: 12px; right: 12px; width: 340px; max-height: 48vh; }

/* Zone collapse */
.zone.collapsed {
  max-height: 34px !important;
  overflow: hidden;
}
.zone.collapsed .zone-content,
.zone.collapsed .zone-tab-spacer { display: none; }

/* Zone hide (slide off-screen) */
.zone.zone-tl.hidden { transform: translateY(calc(-100% - 24px)); opacity: 0; }
.zone.zone-tr.hidden { transform: translateX(calc(100% + 24px)); opacity: 0; }
.zone.zone-bl.hidden { transform: translateY(calc(100% + 24px)); opacity: 0; }
.zone.zone-br.hidden { transform: translateX(calc(100% + 24px)); opacity: 0; }

/* Zone pull tab (appears when zone is hidden) */
.zone-pull-tab {
  position: fixed;
  z-index: 6;
  background: var(--zone-bg);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border: 1px solid var(--zone-border);
  cursor: pointer;
  font-size: 0.7rem;
  color: var(--text-muted);
  padding: 6px 14px;
  transition: opacity 0.3s, transform 0.2s;
  user-select: none;
  opacity: 0;
  pointer-events: none;
}
.zone-pull-tab.visible { opacity: 1; pointer-events: auto; }
.zone-pull-tab:hover { color: var(--text-primary); transform: scale(1.05); }
.zone-pull-tab.tab-tl { top: 0; left: 12px; border-radius: 0 0 8px 8px; border-top: none; }
.zone-pull-tab.tab-tr { top: 0; right: 12px; border-radius: 0 0 8px 8px; border-top: none; }
.zone-pull-tab.tab-bl { bottom: 0; left: 12px; border-radius: 8px 8px 0 0; border-bottom: none; }
.zone-pull-tab.tab-br { bottom: 0; right: 12px; border-radius: 8px 8px 0 0; border-bottom: none; }

/* ═══════════════════════════════════════════════════════════
   TAB BAR — VSCode-style
   ═══════════════════════════════════════════════════════════ */
.zone-tabs {
  display: flex;
  align-items: center;
  gap: 1px;
  padding: 4px 6px 0 6px;
  background: rgba(255, 255, 255, 0.03);
  border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  flex-shrink: 0;
  min-height: 34px;
  overflow-x: auto;
  scrollbar-width: none;
}
.zone-tabs::-webkit-scrollbar { height: 0; }

.zone-tab {
  padding: 5px 14px;
  font-size: 0.76rem;
  font-family: var(--font);
  color: var(--tab-inactive);
  cursor: pointer;
  border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  white-space: nowrap;
  transition: color 0.2s, background 0.2s, box-shadow 0.2s;
  user-select: none;
  position: relative;
  letter-spacing: 0.02em;
}
.zone-tab:hover { color: rgba(255,255,255,0.8); background: var(--tab-hover-bg); }
.zone-tab.active {
  color: var(--text-primary);
  background: var(--tab-active-bg);
  box-shadow: 0 1px 0 rgba(255,255,255,0.08) inset;
}
.zone-tab.active::after {
  content: '';
  position: absolute;
  bottom: 0; left: 14px; right: 14px;
  height: 2px;
  background: var(--accent-gold);
  border-radius: 1px;
  transition: left 0.25s cubic-bezier(0.4, 0, 0.2, 1),
              right 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

.zone-tab-icon { margin-right: 5px; }

/* Zone controls (right side of tab bar) */
.zone-controls {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 2px;
  padding-right: 4px;
  flex-shrink: 0;
}
.zone-ctrl-btn {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.25);
  cursor: pointer;
  font-size: 0.8rem;
  padding: 3px 6px;
  border-radius: 4px;
  transition: color 0.2s, background 0.2s;
  font-family: var(--font);
  line-height: 1;
}
.zone-ctrl-btn:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.08); }
.zone-ctrl-btn.collapse-btn { font-size: 0.9rem; }

/* ═══════════════════════════════════════════════════════════
   PANEL CONTENT AREA
   ═══════════════════════════════════════════════════════════ */
.zone-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 10px 12px;
  position: relative;
  scroll-behavior: smooth;
}
.zone-content::-webkit-scrollbar { width: 3px; }
.zone-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
.zone-content::-webkit-scrollbar-track { background: transparent; }

/* Panel wrapper — one per registered panel */
.zone-panel {
  display: none;
  animation: panel-enter 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}
.zone-panel.active { display: block; }

@keyframes panel-enter {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Panel exit (applied briefly before hiding) */
.zone-panel.exiting {
  animation: panel-exit 0.18s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}
@keyframes panel-exit {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(-6px); }
}

/* ═══════════════════════════════════════════════════════════
   GLASS ELEMENTS (kept for interior use)
   ═══════════════════════════════════════════════════════════ */
.glass {
  background: rgba(255, 255, 255, 0.14);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.16);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  position: relative;
  z-index: 1;
}

/* ═══════════════════════════════════════════════════════════
   MAIN QUEST (zone-tl compact)
   ═══════════════════════════════════════════════════════════ */
#main-quest-input {
  width: 100%;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(255,255,255,0.12);
  color: var(--text-primary);
  font-size: 1.1rem;
  font-weight: 300;
  font-family: var(--font);
  padding: 6px 4px;
  outline: none;
  transition: border-color 0.3s;
}
#main-quest-input:focus { border-bottom-color: rgba(255,255,255,0.4); }
#main-quest-input::placeholder { color: rgba(255,255,255,0.18); }

.quest-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 6px;
  font-size: 0.7rem;
  opacity: 0.4;
}
.quest-meta .activity-pill {
  font-size: 0.68rem;
  opacity: 0.8;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.quest-meta .activity-pill.idle { opacity: 0.4; }

/* ═══════════════════════════════════════════════════════════
   KANBAN BOARD (inside zone-bl)
   ═══════════════════════════════════════════════════════════ */
.kanban-board-inner {
  display: flex;
  gap: 6px;
  flex: 1;
  min-height: 150px;
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: thin;
}
.kanban-board-inner::-webkit-scrollbar { height: 4px; }
.kanban-board-inner::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
.kanban-column {
  flex: 1;
  min-width: 130px;
  max-width: 240px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius-md);
  padding: 8px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.kanban-column-header {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  opacity: 0.4;
  margin-bottom: 8px;
  text-align: center;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}
.kanban-cards {
  flex: 1;
  overflow-y: auto;
  min-height: 40px;
  padding: 2px;
}
.kanban-cards::-webkit-scrollbar { width: 3px; }
.kanban-cards::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

.goal-card {
  background: rgba(255,255,255,0.10);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: var(--radius-md);
  padding: 7px 8px 7px 9px;
  margin-bottom: 5px;
  font-size: 0.78rem;
  cursor: grab;
  transition: transform 0.15s, opacity 0.2s, box-shadow 0.15s;
  position: relative;
  line-height: 1.3;
  word-break: break-word;
}
.goal-card:active { cursor: grabbing; transform: scale(0.97); }
.goal-card.dragging { opacity: 0.5; }
.goal-card.done { opacity: 0.4; text-decoration: line-through; border-color: rgba(100,255,100,0.2); }
.goal-card.overdue { border-left: 3px solid var(--accent-red); }
.goal-card.type-long_term { border-left-color: var(--accent-blue); }
.goal-card.type-habit { border-left-color: var(--accent-green); }
.goal-card.type-maintenance { border-left-color: var(--accent-orange); }
.goal-card.color-blue { border-left-color: #4A90E2; }
.goal-card.color-green { border-left-color: #4CAF50; }
.goal-card.color-orange { border-left-color: #FF9800; }
.goal-card.color-purple { border-left-color: #9C27B0; }
.goal-card.color-gold { border-left-color: #FFD700; }
.goal-card.color-red { border-left-color: #f44336; }
.goal-card.color-teal { border-left-color: #009688; }
.goal-card.color-pink { border-left-color: #e91e63; }
.goal-card .card-meta { font-size: 0.6rem; opacity: 0.35; margin-top: 3px; }
.goal-card .card-actions { position: absolute; top: 4px; right: 6px; display: flex; gap: 2px; }
.goal-card .btn-split, .goal-card .btn-edit {
  background: transparent; border: none; color: rgba(255,255,255,0.25);
  font-size: 0.7rem; cursor: pointer; padding: 2px 4px; border-radius: 4px;
}
.goal-card .btn-split:hover, .goal-card .btn-edit:hover { color: rgba(255,255,255,0.65); background: rgba(255,255,255,0.08); }
.kanban-column.drag-over { background: rgba(255,255,255,0.06); outline: 2px dashed rgba(255,255,255,0.15); outline-offset: -2px; }

.card-edit-input {
  width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.18);
  border-radius: 4px; color: var(--text-primary); font-size: 0.8rem;
  font-family: var(--font); padding: 3px 5px; outline: none; margin-bottom: 3px;
}

/* Kanban panel flex layout — ensures bottom strip stays visible */
#panel-kanban.active {
  display: flex !important;
  flex-direction: column;
  height: 100%;
}

/* Kanban bottom strip (inbox / trash / capture) */
.kanban-strip {
  display: flex;
  gap: 8px;
  padding: 8px 0 0 0;
  margin-top: 8px;
  border-top: 1px solid rgba(255,255,255,0.05);
  flex-shrink: 0;
}
.kanban-strip .strip-zone {
  flex: 1;
  min-height: 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: rgba(255,255,255,0.02);
  border-radius: var(--radius-md);
  border: 1px dashed rgba(255,255,255,0.06);
  padding: 6px;
  transition: background 0.2s, border-color 0.2s;
}
.kanban-strip .strip-zone:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.12); }
.kanban-strip .strip-zone .zone-icon { font-size: 1.1rem; opacity: 0.6; }
.kanban-strip .strip-zone .zone-label { font-size: 0.65rem; opacity: 0.4; text-transform: uppercase; letter-spacing: 0.05em; }
.kanban-strip .strip-capture {
  flex: 2;
  flex-direction: row;
  gap: 6px;
  padding: 4px 8px;
}
.kanban-strip .strip-capture textarea {
  flex: 1;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 0.78rem;
  font-family: var(--font);
  padding: 5px 7px;
  resize: none;
  outline: none;
  min-height: 28px;
}
.kanban-strip .strip-capture textarea:focus { border-color: rgba(255,255,255,0.2); }
.inbox-stack { position: relative; width: 100%; min-height: 38px; }
.inbox-shadow {
  position: absolute; top: 6px; left: 6px; right: 3px; bottom: -3px;
  background: rgba(255,255,255,0.02); border: 1px dashed rgba(255,255,255,0.04);
  border-radius: var(--radius-md);
}
.inbox-shadow + .inbox-shadow { top: 3px; left: 3px; right: 6px; bottom: 0; }
.inbox-blank {
  position: relative; z-index: 1;
  background: rgba(255,255,255,0.03) !important;
  border: 1px dashed rgba(255,255,255,0.12) !important;
  border-radius: var(--radius-md);
  opacity: 0.65; cursor: grab; margin-bottom: 0 !important; min-height: 36px;
  display: flex; align-items: center; justify-content: center;
}
.inbox-blank:hover { opacity: 1; background: rgba(255,255,255,0.06) !important; }
.inbox-blank .card-title { opacity: 0.45; font-style: italic; font-size: 0.75rem; }

/* Chaos strip (inside kanban) */
.chaos-strip { flex-shrink: 0; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.04); }
.chaos-strip .chaos-toggle { font-size: 0.7rem; cursor: pointer; opacity: 0.4; padding: 3px 0; }
.chaos-strip .chaos-toggle:hover { opacity: 0.7; }
.chaos-strip .chaos-body { display: none; margin-top: 5px; }
.chaos-strip .chaos-body.open { display: flex; gap: 6px; align-items: center; }
.chaos-strip textarea {
  flex: 1; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-sm); color: var(--text-primary); font-size: 0.78rem;
  font-family: var(--font); padding: 6px 8px; resize: none; outline: none;
  min-height: 32px; max-height: 50px;
}
.chaos-strip textarea:focus { border-color: rgba(255,255,255,0.25); }
.chaos-strip .btn-sm { font-size: 0.75rem; padding: 6px 12px; }

/* Quick-add */
.quick-add-area { flex-shrink: 0; padding: 3px 1px; }
.quick-add-btn {
  width: 100%; text-align: left; opacity: 0.35; cursor: pointer;
  font-size: 0.73rem; padding: 5px 7px; border-radius: var(--radius-sm);
  border: 1px dashed rgba(255,255,255,0.12); background: transparent; color: var(--text-primary);
}
.quick-add-btn:hover { opacity: 0.65; background: rgba(255,255,255,0.04); }
.quick-add-input { display: none; width: 100%; }
.quick-add-input.open { display: block; }
.quick-add-input input {
  width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-sm); color: var(--text-primary); font-size: 0.78rem;
  font-family: var(--font); padding: 5px 8px; outline: none;
}

/* Buttons */
.btn {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius-md);
  color: var(--text-primary);
  font-size: 0.85rem;
  font-family: var(--font);
  padding: 8px 16px;
  cursor: pointer;
  transition: background 0.25s, border-color 0.25s, opacity 0.25s;
  white-space: nowrap;
}
.btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.22); }
.btn:active { transform: scale(0.97); }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
.btn-sm { font-size: 0.75rem; padding: 6px 12px; }

/* ═══════════════════════════════════════════════════════════
   GOALS PANEL (zone-bl)
   ═══════════════════════════════════════════════════════════ */
.goal-panel-card {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.10);
  border-radius: var(--radius-md);
  padding: 10px 12px;
  margin-bottom: 8px;
  transition: background 0.2s, border-color 0.2s;
}
.goal-panel-card:hover { background: rgba(255,255,255,0.10); border-color: rgba(255,255,255,0.16); }
.goal-panel-card.type-long_term { border-left: 3px solid var(--accent-blue); }
.goal-panel-card.type-habit { border-left: 3px solid var(--accent-green); }
.goal-panel-card.type-maintenance { border-left: 3px solid var(--accent-orange); }
.goal-panel-card.paused { opacity: 0.45; }

.goal-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.goal-panel-title { font-size: 0.85rem; font-weight: 500; }
.goal-panel-type {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.4;
  padding: 2px 7px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
}
.goal-panel-progress {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}
.progress-bar {
  flex: 1;
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}
.progress-bar .progress-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  background: var(--accent-gold);
}
.progress-bar .progress-fill.high { background: var(--accent-green); }
.progress-bar .progress-fill.low { background: var(--accent-red); }
.goal-panel-pct { font-size: 0.75rem; opacity: 0.6; min-width: 36px; text-align: right; }

.goal-panel-meta {
  display: flex;
  gap: 10px;
  margin-top: 4px;
  font-size: 0.65rem;
  opacity: 0.35;
}
.goal-panel-actions {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  justify-content: flex-end;
}
.goal-panel-actions button {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-size: 0.65rem;
  font-family: var(--font);
  padding: 3px 8px;
  cursor: pointer;
  transition: all 0.2s;
}
.goal-panel-actions button:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.05); }
.goal-panel-actions button.danger:hover { border-color: var(--accent-red); color: var(--accent-red); }

.empty-state {
  text-align: center;
  padding: 30px 10px;
  opacity: 0.35;
  font-size: 0.85rem;
}

/* ═══════════════════════════════════════════════════════════
   STATS PANEL (zone-tr)
   ═══════════════════════════════════════════════════════════ */
.stat-item { margin-bottom: 10px; }
.stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; opacity: 0.35; }
.stat-value { font-size: 1.1rem; font-weight: 500; }
.stat-sub { font-size: 0.7rem; opacity: 0.5; }

.nudge-item {
  font-size: 0.7rem;
  padding: 7px 9px;
  border-radius: var(--radius-sm);
  background: rgba(255,215,0,0.06);
  border: 1px solid rgba(255,215,0,0.12);
  margin-bottom: 6px;
  line-height: 1.4;
}
.nudge-item.alert { background: rgba(255,100,100,0.06); border-color: rgba(255,100,100,0.15); }
.nudge-item.suggestion { background: rgba(100,200,255,0.06); border-color: rgba(100,200,255,0.15); }

/* Focus bars (inside stats) */
.focus-bar-row {
  display: flex; align-items: center; gap: 6px; margin-bottom: 3px;
  cursor: pointer; font-size: 0.7rem;
}
.focus-bar-label { width: 50px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; opacity: 0.6; flex-shrink: 0; }
.focus-bar-track { flex: 1; height: 14px; background: rgba(255,255,255,0.05); border-radius: 7px; overflow: hidden; }
.focus-bar-fill { height: 100%; border-radius: 7px; transition: width 0.5s ease; min-width: 2px; }
.focus-bar-fill.focus { background: #FFD700; }
.focus-bar-fill.distraction { background: #e05050; }
.focus-bar-fill.neutral { background: #888; }
.focus-bar-fill.idle { background: #557; }
.focus-bar-fill.away { background: #335; }
.focus-bar-pct { width: 36px; text-align: right; opacity: 0.45; flex-shrink: 0; }

/* ═══════════════════════════════════════════════════════════
   SUNRISE (zone-tr or floating)
   ═══════════════════════════════════════════════════════════ */
.sunrise-area {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  gap: 8px;
}
#sunrise-btn {
  flex: 1;
  background: rgba(255, 215, 0, 0.10);
  border: 1px solid rgba(255, 215, 0, 0.22);
  color: var(--accent-gold);
  font-size: 0.78rem;
  padding: 8px 14px;
  border-radius: 20px;
  cursor: pointer;
  transition: background 0.3s, box-shadow 0.3s;
  font-family: var(--font);
}
#sunrise-btn:hover { background: rgba(255, 215, 0, 0.18); box-shadow: 0 0 18px rgba(255, 215, 0, 0.08); }
#sunrise-btn:disabled { opacity: 0.25; cursor: not-allowed; box-shadow: none; }

#sunrise-gear {
  background: transparent; border: none; color: rgba(255,255,255,0.2);
  font-size: 1rem; cursor: pointer; padding: 4px;
  transition: color 0.3s, transform 0.3s; font-family: var(--font);
}
#sunrise-gear:hover { color: rgba(255,255,255,0.55); transform: rotate(30deg); }
#sunrise-gear.active { color: var(--accent-gold); transform: rotate(60deg); }

.sunrise-settings-inline {
  display: none;
  margin-top: 6px;
  font-size: 0.7rem;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.sunrise-settings-inline.open { display: flex; }
.sunrise-settings-inline label { display: flex; align-items: center; gap: 4px; cursor: pointer; opacity: 0.6; }
.sunrise-settings-inline input[type="time"] {
  background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px; color: var(--text-primary); font-size: 0.75rem;
  font-family: var(--font); padding: 3px 6px; outline: none;
}

/* Toggle switch */
.toggle-switch { position: relative; display: inline-block; width: 32px; height: 18px; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255,255,255,0.12); border-radius: 18px;
  transition: background 0.3s;
}
.toggle-slider::before {
  content: ""; position: absolute;
  height: 14px; width: 14px; left: 2px; bottom: 2px;
  background: var(--text-primary); border-radius: 50%;
  transition: transform 0.3s;
}
.toggle-switch input:checked + .toggle-slider { background: rgba(255, 215, 0, 0.4); }
.toggle-switch input:checked + .toggle-slider::before { transform: translateX(14px); }

/* ═══════════════════════════════════════════════════════════
   FEED PANEL (zone-tl)
   ═══════════════════════════════════════════════════════════ */
.feed-container {
  display: flex;
  flex-direction: column;
  height: 100%;
}
.feed-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  margin-bottom: 8px;
  flex-shrink: 0;
}
.feed-header-info {
  font-size: 0.68rem;
  opacity: 0.45;
}
.feed-header-info .dot { margin: 0 4px; opacity: 0.3; }
.feed-btn {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: var(--radius-sm);
  color: var(--text-muted);
  font-size: 0.7rem;
  font-family: var(--font);
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.feed-btn:hover { color: var(--text-primary); border-color: rgba(255,255,255,0.25); background: rgba(255,255,255,0.1); }
.feed-btn:disabled { opacity: 0.35; cursor: not-allowed; }
.feed-btn.active { color: var(--accent-gold); border-color: rgba(255,215,0,0.3); }

.feed-items {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin;
}
.feed-items::-webkit-scrollbar { width: 3px; }
.feed-items::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 3px; }

.feed-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius-md);
  padding: 8px 10px;
  margin-bottom: 6px;
  transition: background 0.2s, border-color 0.2s, opacity 0.3s, transform 0.3s;
  position: relative;
}
.feed-card:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.12); }
.feed-card.dismissing {
  opacity: 0;
  transform: translateX(30px);
}
.feed-card-header {
  display: flex;
  align-items: flex-start;
  gap: 6px;
}
.feed-card-icon {
  font-size: 0.9rem;
  flex-shrink: 0;
  margin-top: 1px;
  width: 18px;
  text-align: center;
}
.feed-card-body {
  flex: 1;
  min-width: 0;
}
.feed-card-title {
  font-size: 0.78rem;
  line-height: 1.4;
  word-break: break-word;
  color: var(--text-primary);
}
.feed-card-meta {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 4px;
  margin-top: 4px;
}
.feed-card-tag {
  font-size: 0.6rem;
  padding: 1px 6px;
  border-radius: 8px;
  background: rgba(255,255,255,0.06);
  opacity: 0.6;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.feed-card-relevance {
  font-size: 0.6rem;
  opacity: 0.5;
  display: flex;
  align-items: center;
  gap: 3px;
}
.feed-card-relevance-bar {
  width: 40px;
  height: 3px;
  background: rgba(255,255,255,0.08);
  border-radius: 2px;
  overflow: hidden;
}
.feed-card-relevance-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.5s;
}
.feed-card-relevance-fill.high { background: var(--accent-green); }
.feed-card-relevance-fill.medium { background: var(--accent-gold); }
.feed-card-relevance-fill.low { background: var(--accent-orange); }
.feed-card-actions {
  display: flex;
  gap: 2px;
  flex-shrink: 0;
  margin-left: auto;
}
.feed-card-action {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.2);
  font-size: 0.75rem;
  cursor: pointer;
  padding: 2px 5px;
  border-radius: 4px;
  transition: color 0.2s, background 0.2s;
  font-family: var(--font);
  line-height: 1;
}
.feed-card-action:hover { color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.08); }
.feed-card-action.link:hover { color: var(--accent-blue); }
.feed-card-action.dismiss:hover { color: var(--accent-red); }

.feed-footer {
  flex-shrink: 0;
  padding-top: 6px;
  margin-top: 4px;
  border-top: 1px solid rgba(255,255,255,0.04);
  text-align: center;
}
.feed-footer-btn {
  background: transparent;
  border: none;
  color: rgba(255,255,255,0.25);
  font-size: 0.68rem;
  cursor: pointer;
  padding: 4px 10px;
  border-radius: 4px;
  font-family: var(--font);
  transition: color 0.2s;
}
.feed-footer-btn:hover { color: rgba(255,255,255,0.6); }

/* Pulse animation for fetch in progress */
.feed-pulse {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent-gold);
  animation: feed-pulse 1s ease-in-out infinite;
  margin-right: 4px;
  vertical-align: middle;
}
@keyframes feed-pulse {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* ═══════════════════════════════════════════════════════════
   CHAT PANEL (zone-br)
   ═══════════════════════════════════════════════════════════ */
.chat-messages {
  flex: 1;
  overflow-y: auto;
  min-height: 100px;
  max-height: 250px;
  margin-bottom: 8px;
}
.chat-msg {
  padding: 6px 0;
  font-size: 0.8rem;
  line-height: 1.4;
}
.chat-msg.user { color: var(--accent-gold); }
.chat-msg.ai { color: var(--text-primary); opacity: 0.8; }
.chat-input-row {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}
.chat-input-row input {
  flex: 1;
  background: rgba(0,0,0,0.3);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 0.8rem;
  font-family: var(--font);
  padding: 7px 10px;
  outline: none;
}
.chat-input-row input:focus { border-color: rgba(255,255,255,0.25); }
.chat-input-row button {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.14);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 0.78rem;
  font-family: var(--font);
  padding: 7px 12px;
  cursor: pointer;
}
.chat-input-row button:hover { background: rgba(255,255,255,0.14); }

/* ═══════════════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════════════ */
#toast-container {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  z-index: 100; display: flex; flex-direction: column; gap: 6px;
}
.toast {
  background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
  padding: 10px 16px; font-size: 0.85rem; color: var(--text-primary);
  display: flex; gap: 12px; align-items: center;
  animation: toast-in 0.3s ease;
}
@keyframes toast-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
.toast .toast-btn {
  background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
  border-radius: 6px; color: var(--text-primary); font-size: 0.8rem;
  padding: 4px 10px; cursor: pointer; white-space: nowrap;
}
.toast .toast-btn:hover { background: rgba(255,255,255,0.2); }
.loading-spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(255,255,255,0.15); border-top-color: var(--text-primary);
  border-radius: 50%; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ═══════════════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════════════ */
@media (max-width: 700px) {
  .zone.zone-tl, .zone.zone-tr, .zone.zone-bl, .zone.zone-br {
    left: 6px; right: 6px; width: auto; max-height: 35vh;
  }
  .zone.zone-tl { top: 6px; }
  .zone.zone-tr { top: auto; bottom: 50%; right: 6px; width: 45%; }
  .zone.zone-bl { bottom: 6px; left: 6px; right: 50%; width: auto; }
  .zone.zone-br { bottom: 6px; right: 6px; left: 50%; width: auto; }
  .kanban-board-inner { flex-wrap: wrap; }
  .kanban-column { min-width: 90px; max-width: none; }
}

@media (max-width: 480px) {
  .zone.zone-tl { width: 100%; left: 4px; right: 4px; top: 4px; max-height: 22vh; }
  .zone.zone-tr { width: 100%; left: 4px; right: 4px; top: auto; bottom: 50%; max-height: 28vh; }
  .zone.zone-bl { width: 100%; left: 4px; right: 4px; bottom: 4px; max-height: 22vh; }
  .zone.zone-br { display: none; }
  .zone-tab { padding: 5px 10px; font-size: 0.7rem; }
}

/* ═══════════════════════════════════════════════════════════
   REDUCED MOTION
   ═══════════════════════════════════════════════════════════ */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    transition-duration: 0.01ms !important;
    animation-duration: 0.01ms !important;
  }
  #nebula { display: none; }
}
</style>
</head>
<body>

<!-- Canvas (center — immersive, always visible) -->
<canvas id="nebula"></canvas>

<!-- Zone: Top-Left -->
<div class="zone zone-tl" id="zone-tl">
  <div class="zone-tabs" id="zone-tl-tabs">
    <div class="zone-tab active" data-panel="quest"><span class="zone-tab-icon">&#x1F3AF;</span>Quest</div>
    <div class="zone-tab" data-panel="feed"><span class="zone-tab-icon">&#x1F4E1;</span>Feed</div>
    <div class="zone-controls">
      <button class="zone-ctrl-btn collapse-btn" title="Hide zone" onclick="PanelSystem.collapseZone('tl')">&#x25B4;</button>
    </div>
  </div>
  <div class="zone-content" id="zone-tl-content">
    <div class="zone-panel active" data-panel="quest" id="panel-quest"></div>
    <div class="zone-panel" data-panel="feed" id="panel-feed"></div>
  </div>
</div>
<div class="zone-pull-tab tab-tl" id="pull-tl" onclick="PanelSystem.showZone('tl')">&#x1F3AF; Quest</div>

<!-- Zone: Top-Right -->
<div class="zone zone-tr" id="zone-tr">
  <div class="zone-tabs" id="zone-tr-tabs">
    <div class="zone-tab active" data-panel="stats"><span class="zone-tab-icon">&#x1F4CA;</span>Stats</div>
    <div class="zone-controls">
      <button class="zone-ctrl-btn collapse-btn" title="Collapse zone" onclick="PanelSystem.collapseZone('tr')">&#x25B4;</button>
    </div>
  </div>
  <div class="zone-content" id="zone-tr-content">
    <div class="zone-panel active" data-panel="stats" id="panel-stats"></div>
  </div>
</div>
<div class="zone-pull-tab tab-tr" id="pull-tr" onclick="PanelSystem.showZone('tr')">&#x1F4CA; Stats</div>

<!-- Zone: Bottom-Left -->
<div class="zone zone-bl" id="zone-bl">
  <div class="zone-tabs" id="zone-bl-tabs">
    <div class="zone-tab active" data-panel="kanban"><span class="zone-tab-icon">&#x1F4CB;</span>Kanban</div>
    <div class="zone-tab" data-panel="goals"><span class="zone-tab-icon">&#x1F3AF;</span>Goals</div>
    <div class="zone-controls">
      <button class="zone-ctrl-btn collapse-btn" title="Collapse zone" onclick="PanelSystem.collapseZone('bl')">&#x25BE;</button>
    </div>
  </div>
  <div class="zone-content" id="zone-bl-content">
    <div class="zone-panel active" data-panel="kanban" id="panel-kanban"></div>
    <div class="zone-panel" data-panel="goals" id="panel-goals"></div>
  </div>
</div>
<div class="zone-pull-tab tab-bl" id="pull-bl" onclick="PanelSystem.showZone('bl')">&#x1F4CB; Kanban</div>

<!-- Zone: Bottom-Right -->
<div class="zone zone-br" id="zone-br">
  <div class="zone-tabs" id="zone-br-tabs">
    <div class="zone-tab active" data-panel="chat"><span class="zone-tab-icon">&#x1F4AC;</span>Chat</div>
    <div class="zone-controls">
      <button class="zone-ctrl-btn collapse-btn" title="Collapse zone" onclick="PanelSystem.collapseZone('br')">&#x25BE;</button>
    </div>
  </div>
  <div class="zone-content" id="zone-br-content">
    <div class="zone-panel active" data-panel="chat" id="panel-chat"></div>
  </div>
</div>
<div class="zone-pull-tab tab-br" id="pull-br" onclick="PanelSystem.showZone('br')">&#x1F4AC; Chat</div>

<!-- Toast container -->
<div id="toast-container"></div>

<script>
/* ═══════════════════════════════════════════════════════════
   GLOBALS
   ═══════════════════════════════════════════════════════════ */
const canvas = document.getElementById('nebula');
let ctx = null;
try { ctx = canvas.getContext('2d'); } catch (err) { console.warn('Canvas 2D context not available:', err); }

let canvasW, canvasH;
let stars = [];
const STAR_COUNT = 200;
const MAX_FRAME_MS = 50;
let bgColor = { r: 10, g: 10, b: 15 };
let targetColor = { r: 10, g: 10, b: 15 };
let sunriseActive = false;
let canvasOk = ctx !== null;

/* ═══════════════════════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════════════════════ */
function hexToRgb(hex) { const val = parseInt(hex.replace('#', ''), 16); return { r: (val >> 16) & 255, g: (val >> 8) & 255, b: val & 255 }; }
function lerpChannel(a, b, t) { return Math.round(a + (b - a) * t); }
function lerpColor(a, b, t) { return { r: lerpChannel(a.r, b.r, t), g: lerpChannel(a.g, b.g, t), b: lerpChannel(a.b, b.b, t) }; }
function rgbToStyle(c) { return 'rgb(' + c.r + ',' + c.g + ',' + c.b + ')'; }
function escapeHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ═══════════════════════════════════════════════════════════
   CANVAS SETUP
   ═══════════════════════════════════════════════════════════ */
function resizeCanvas() { canvasW = canvas.width = window.innerWidth; canvasH = canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas);

function createStar() { return { x: Math.random() * canvasW, y: Math.random() * canvasH, radius: 0.5 + Math.random() * 2, speed: 0.1 + Math.random() * 0.4, alpha: 0.3 + Math.random() * 0.7 }; }
function initStars(count) { stars = []; for (let i = 0; i < count; i++) stars.push(createStar()); }

let lastFrameTime = 0, animActive = true, currentStarCount = STAR_COUNT;

function animate(timestamp) {
  if (!animActive || !canvasOk) return;
  if (lastFrameTime > 0) { const delta = timestamp - lastFrameTime; if (delta > MAX_FRAME_MS && currentStarCount > 100) { currentStarCount = 100; initStars(currentStarCount); } }
  lastFrameTime = timestamp;
  ctx.fillStyle = rgbToStyle(bgColor);
  ctx.fillRect(0, 0, canvasW, canvasH);
  for (const star of stars) {
    star.y -= star.speed;
    if (star.y + star.radius < 0) { star.y = canvasH + star.radius; star.x = Math.random() * canvasW; }
    ctx.beginPath(); ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255, 255, 255, ' + star.alpha + ')'; ctx.fill();
  }
  requestAnimationFrame(animate);
}

// Color interpolation
let colorLerpActive = false, colorLerpStart = 0, colorLerpDuration = 5000;
let colorLerpFrom = { r: 0, g: 0, b: 0 }, colorLerpTo = { r: 10, g: 10, b: 15 };

function startColorLerp(from, to, duration) { colorLerpFrom = from; colorLerpTo = to; colorLerpDuration = duration; colorLerpActive = true; colorLerpStart = performance.now(); }
function updateColorLerp() {
  if (!colorLerpActive) return;
  const elapsed = performance.now() - colorLerpStart;
  const t = Math.min(elapsed / colorLerpDuration, 1);
  bgColor = lerpColor(colorLerpFrom, colorLerpTo, t);
  if (t >= 1) { bgColor = { ...colorLerpTo }; colorLerpActive = false; }
}
const _origAnimate = animate;
animate = function(timestamp) { updateColorLerp(); _origAnimate(timestamp); };

async function fetchTimeColor() {
  try { const res = await fetch('/api/time_color'); if (!res.ok) throw new Error('HTTP ' + res.status); const data = await res.json(); targetColor = hexToRgb(data.hex); }
  catch (err) { console.warn('Failed to fetch /api/time_color:', err); targetColor = { r: 10, g: 10, b: 15 }; }
  startColorLerp({ ...bgColor }, targetColor, 5000);
}

/* ═══════════════════════════════════════════════════════════
   PANEL SYSTEM
   ═══════════════════════════════════════════════════════════ */
const PanelSystem = {
  _panels: {},    // panelId -> { zone, title, icon, render, refreshInterval }
  _zones: {},     // zoneId -> { activePanelId, collapsed, hidden }

  register(panelId, config) {
    this._panels[panelId] = { id: panelId, zone: config.zone, title: config.title, icon: config.icon, render: config.render, refreshInterval: config.refreshInterval || 0, defaultActive: config.defaultActive || false };
  },

  async init() {
    // Build zone state map
    ['tl','tr','bl','br'].forEach(zid => {
      this._zones[zid] = { activePanelId: null, collapsed: false, hidden: false };
    });

    // Determine default active panel per zone (first registered, or restore from localStorage)
    for (const [pid, p] of Object.entries(this._panels)) {
      if (p.defaultActive && !this._zones[p.zone].activePanelId) {
        this._zones[p.zone].activePanelId = pid;
      }
    }
    // Fallback: first panel in each zone
    for (const [pid, p] of Object.entries(this._panels)) {
      if (!this._zones[p.zone].activePanelId) this._zones[p.zone].activePanelId = pid;
    }

    // Restore saved state
    try {
      const saved = JSON.parse(localStorage.getItem('hz_panels') || '{}');
      for (const [zid, state] of Object.entries(saved)) {
        if (this._zones[zid]) {
          if (state.activePanelId && this._panels[state.activePanelId]) this._zones[zid].activePanelId = state.activePanelId;
          if (state.collapsed) this._zones[zid].collapsed = true;
          if (state.hidden) this._zones[zid].hidden = true;
        }
      }
    } catch(e) {}

    // Wire tab clicks
    document.querySelectorAll('.zone-tab[data-panel]').forEach(tab => {
      tab.addEventListener('click', () => {
        const zoneEl = tab.closest('.zone');
        const zoneId = zoneEl.id.replace('zone-', '');
        this.activatePanel(zoneId, tab.dataset.panel);
      });
    });

    // Apply saved zone states
    for (const [zid, state] of Object.entries(this._zones)) {
      if (state.collapsed) this._applyCollapsed(zid, true);
      if (state.hidden) this._applyHidden(zid, true);
    }

    // Initial render of all active panels
    for (const [zid, state] of Object.entries(this._zones)) {
      if (!state.collapsed && !state.hidden && state.activePanelId) {
        await this._renderPanel(state.activePanelId);
        this._updateTabs(zid, state.activePanelId);
      }
    }

    this._startRefreshLoops();
    this._saveState();
  },

  async activatePanel(zoneId, panelId) {
    const zoneEl = document.getElementById('zone-' + zoneId);
    if (!zoneEl) return;

    // If zone is collapsed, expand it
    if (this._zones[zoneId].collapsed) {
      this._applyCollapsed(zoneId, false);
      this._zones[zoneId].collapsed = false;
    }
    if (this._zones[zoneId].hidden) {
      this._applyHidden(zoneId, false);
      this._zones[zoneId].hidden = false;
    }

    this._zones[zoneId].activePanelId = panelId;

    // Update tab active state
    this._updateTabs(zoneId, panelId);

    // Show the panel, hide siblings
    const content = document.getElementById('zone-' + zoneId + '-content');
    if (!content) return;
    content.querySelectorAll('.zone-panel').forEach(p => {
      if (p.dataset.panel === panelId) { p.classList.add('active'); p.style.display = 'block'; }
      else { p.classList.remove('active'); p.style.display = 'none'; }
    });

    // Render the panel
    await this._renderPanel(panelId);
    this._saveState();
  },

  collapseZone(zoneId) {
    const collapsed = !this._zones[zoneId].collapsed;
    this._zones[zoneId].collapsed = collapsed;
    this._applyCollapsed(zoneId, collapsed);
    this._saveState();
  },

  toggleHidden(zoneId) {
    const hidden = !this._zones[zoneId].hidden;
    this._zones[zoneId].hidden = hidden;
    this._applyHidden(zoneId, hidden);
    this._saveState();
  },

  showZone(zoneId) {
    // Called from pull tab
    if (this._zones[zoneId].hidden) {
      this._zones[zoneId].hidden = false;
      this._applyHidden(zoneId, false);
    }
    if (this._zones[zoneId].collapsed) {
      this._zones[zoneId].collapsed = false;
      this._applyCollapsed(zoneId, false);
    }
    this._saveState();
    // Re-render the active panel
    if (this._zones[zoneId].activePanelId) {
      this._updateTabs(zoneId, this._zones[zoneId].activePanelId);
      this._renderPanel(this._zones[zoneId].activePanelId);
    }
  },

  refreshPanel(panelId) {
    return this._renderPanel(panelId);
  },

  // Internal
  _applyCollapsed(zoneId, collapsed) {
    const zoneEl = document.getElementById('zone-' + zoneId);
    if (!zoneEl) return;
    if (collapsed) zoneEl.classList.add('collapsed');
    else zoneEl.classList.remove('collapsed');
    // Update button icon (inverted for bottom zones since they collapse downward)
    const btn = zoneEl.querySelector('.collapse-btn');
    const isBottom = zoneId === 'bl' || zoneId === 'br';
    if (btn) {
      if (isBottom) { btn.innerHTML = collapsed ? '&#x25B4;' : '&#x25BE;'; }
      else { btn.innerHTML = collapsed ? '&#x25BE;' : '&#x25B4;'; }
    }
  },

  _applyHidden(zoneId, hidden) {
    const zoneEl = document.getElementById('zone-' + zoneId);
    const pullTab = document.getElementById('pull-' + zoneId);
    if (!zoneEl || !pullTab) return;
    if (hidden) { zoneEl.classList.add('hidden'); pullTab.classList.add('visible'); }
    else { zoneEl.classList.remove('hidden'); pullTab.classList.remove('visible'); }
  },

  _updateTabs(zoneId, activePanelId) {
    const tabsEl = document.getElementById('zone-' + zoneId + '-tabs');
    if (!tabsEl) return;
    tabsEl.querySelectorAll('.zone-tab[data-panel]').forEach(t => {
      t.classList.toggle('active', t.dataset.panel === activePanelId);
    });
    // Update pull tab text
    const pullTab = document.getElementById('pull-' + zoneId);
    const panel = this._panels[activePanelId];
    if (pullTab && panel) {
      pullTab.innerHTML = (panel.icon || '') + ' ' + panel.title;
    }
  },

  async _renderPanel(panelId) {
    const panel = this._panels[panelId];
    if (!panel || !panel.render) return;
    const container = document.getElementById('panel-' + panelId);
    if (!container) return;
    try { await panel.render(container); } catch(e) { console.warn('Panel render error (' + panelId + '):', e); }
  },

  _startRefreshLoops() {
    for (const [pid, p] of Object.entries(this._panels)) {
      if (p.refreshInterval > 0) {
        setInterval(() => {
          const zoneId = p.zone;
          const state = this._zones[zoneId];
          if (!state || state.collapsed || state.hidden) return;
          if (state.activePanelId !== pid) return;
          this._renderPanel(pid);
        }, p.refreshInterval);
      }
    }
  },

  _saveState() {
    try {
      const state = {};
      for (const [zid, zs] of Object.entries(this._zones)) {
        state[zid] = { activePanelId: zs.activePanelId, collapsed: zs.collapsed, hidden: zs.hidden };
      }
      localStorage.setItem('hz_panels', JSON.stringify(state));
    } catch(e) {}
  }
};

let _feedShowDismissed = false;

const FEED_SOURCE_ICONS = {
  'YouTube': '▶️', 'youtube': '▶️',
  'LessWrong': '📄', 'lesswrong': '📄', 'lesswrong.com': '📄',
  'Discord': '💬', 'discord': '💬',
  'Twitter': '🐦', 'twitter': '🐦', 'X': '🐦',
  'Reddit': '📊', 'reddit': '📊',
  'RSS': '📡', 'rss': '📡',
};

function getFeedIcon(item) {
  const name = item.source_name || '';
  if (FEED_SOURCE_ICONS[name]) return FEED_SOURCE_ICONS[name];
  if (name.toLowerCase().includes('youtube')) return '▶️';
  if (name.toLowerCase().includes('discord')) return '💬';
  if (name.toLowerCase().includes('twitter') || name.toLowerCase().includes('x.com')) return '🐦';
  if (name.toLowerCase().includes('reddit')) return '📊';
  if (name.toLowerCase().includes('less')) return '📄';
  return '📡';
}

function getRelevanceClass(score) {
  if (score >= 7) return 'high';
  if (score >= 4) return 'medium';
  return 'low';
}

function formatTimeAgo(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    const now = new Date();
    const diffMs = now - d;
    const diffMin = Math.floor(diffMs / 60000);
    if (diffMin < 1) return 'just now';
    if (diffMin < 60) return diffMin + 'm ago';
    const diffHr = Math.floor(diffMin / 60);
    if (diffHr < 24) return diffHr + 'h ago';
    return Math.floor(diffHr / 24) + 'd ago';
  } catch(e) { return ''; }
}

async function feedDismiss(itemId, cardEl) {

  }, 250);

async function feedTriggerFetch(btnEl) {
  if (!btnEl) return;
  btnEl.disabled = true;
  btnEl.innerHTML = '<span class="feed-pulse"></span>Fetching...';
  try {
    const res = await fetch('/api/feed/trigger', { method: 'POST' });
    if (!res.ok) {
      const data = await res.json();
      showToast(data.detail || 'Failed to trigger fetch');
    } else {
      showToast('Fetch triggered! Waiting for n8n...');
    }
  } catch(e) {
    showToast('Could not reach server');
  }
  setTimeout(() => PanelSystem.refreshPanel('feed'), 3000);
}

function feedCardHtml(item) {
  const icon = getFeedIcon(item);
  const relevanceBarClass = getRelevanceClass(item.relevance_score);
  const pct = Math.min(item.relevance_score * 10, 100);
  const timeAgo = formatTimeAgo(item.created_at);
  const tag = item.category ? '<span class="feed-card-tag">' + escapeHtml(item.category) + '</span>' : '';
  const priorityTag = item.priority_level >= 70 ? '<span class="feed-card-tag" style="opacity:0.8;color:var(--accent-orange)">high</span>' :
    item.priority_level >= 40 ? '<span class="feed-card-tag">medium</span>' : '';
  const linkBtn = item.source_url ? '<button class="feed-card-action link" onclick="window.open(\'' + escapeHtml(item.source_url) + '\',\'_blank\')" title="Open link">🔗</button>' : '';
  return '<div class="feed-card" data-id="' + item.id + '">' +
    '<div class="feed-card-header">' +
      '<span class="feed-card-icon">' + icon + '</span>' +
      '<div class="feed-card-body">' +
        '<div class="feed-card-title">' + escapeHtml(item.one_liner) + '</div>' +
        '<div class="feed-card-meta">' +
          (item.source_name ? '<span style="font-size:0.6rem;opacity:0.35;">' + escapeHtml(item.source_name) + '</span>' : '') +
          tag + priorityTag +
          '<span class="feed-card-relevance">' +
            '<span class="feed-card-relevance-bar"><span class="feed-card-relevance-fill ' + relevanceBarClass + '" style="width:' + pct + '%"></span></span>' +
            item.relevance_score.toFixed(1) +
          '</span>' +
          '<span style="font-size:0.6rem;opacity:0.25;">' + timeAgo + '</span>' +
        '</div>' +
      '</div>' +
      '<div class="feed-card-actions">' +
        linkBtn +
        '<button class="feed-card-action dismiss" onclick="feedDismiss(' + item.id + ', this.closest(\'.feed-card\'))" title="Dismiss">✕</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

// Helper to wire sunrise elements (called after stats render)
function wireSunriseElements(container) {
  const sunriseBtn = container.querySelector('#sunrise-btn');
  const sunriseGear = container.querySelector('#sunrise-gear');
  const sunriseSettings = container.querySelector('#sunrise-settings-inline');
  const sunriseToggle = container.querySelector('#sunrise-toggle');
  const sunriseTimeInput = container.querySelector('#sunrise-time');

  if (sunriseBtn && !sunriseBtn._wired) {
    sunriseBtn._wired = true;
    sunriseBtn.addEventListener('click', startSunriseSequence);
  }
  if (sunriseGear && !sunriseGear._wired) {
    sunriseGear._wired = true;
    sunriseGear.addEventListener('click', () => {
      if (sunriseSettings) { sunriseSettings.classList.toggle('open'); sunriseGear.classList.toggle('active'); }
      if (sunriseSettings && sunriseSettings.classList.contains('open')) loadScheduleFromServer(sunriseToggle, sunriseTimeInput);
    });
  }
  if (sunriseToggle && !sunriseToggle._wired) {
    sunriseToggle._wired = true;
    sunriseToggle.addEventListener('change', () => {
      const enabled = sunriseToggle.checked;
      const time = (sunriseTimeInput && sunriseTimeInput.value) || '07:00';
      autoSunriseLocalEnabled = enabled; autoSunriseLocalTime = time;
      saveScheduleToServer(enabled, time); saveAutoSunriseLocal();
    });
  }
  if (sunriseTimeInput && !sunriseTimeInput._wired) {
    sunriseTimeInput._wired = true;
    sunriseTimeInput.addEventListener('change', () => {
      const enabled = sunriseToggle ? sunriseToggle.checked : false;
      const time = sunriseTimeInput.value || '07:00';
      autoSunriseLocalEnabled = enabled; autoSunriseLocalTime = time;
      saveScheduleToServer(enabled, time); saveAutoSunriseLocal();
    });
  }
  // Restore schedule state
  loadScheduleFromServer(sunriseToggle, sunriseTimeInput);
}

PanelSystem._toggleAppCategory = async function(appName) {
  try {
    const res = await fetch('/api/activity/categories');
    const data = await res.json();
    const existing = (data.categories || []).find(c => c.app_name === appName);
    const cycle = { 'focus': 'distraction', 'distraction': 'neutral', 'neutral': 'focus', 'idle': 'focus', 'away': 'focus' };
    const nextCat = cycle[existing ? existing.category : 'focus'] || 'focus';
    await fetch('/api/activity/categories', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ app_name: appName, category: nextCat }) });
    PanelSystem.refreshPanel('stats');
  } catch(e) { console.warn('Toggle category failed:', e); }
};

          try { const r = await fetch('/api/classify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({raw_text:ta.value.trim()})}); if(r.ok){ta.value='';showToast('Classified!');renderKanbanContent();} } catch(e){showToast('Failed');}
        });

        const addTaskBtn = document.getElementById('add-task-btn');
        if (addTaskBtn) addTaskBtn.addEventListener('click', () => { const inp = document.getElementById('quick-task-input'); if(inp){inp.parentElement.classList.toggle('open');inp.focus();} });
        const qti = document.getElementById('quick-task-input');
        if (qti) qti.addEventListener('keydown', async function(e) {
          if (e.key==='Enter' && this.value.trim()) {
            try { await fetch('/api/goals',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:this.value.trim(),type:'long_term'})}); this.value=''; this.parentElement.classList.remove('open'); showToast('Created!'); renderKanbanContent(); } catch(e) { showToast('Failed'); }
          }
        });

      }, 100);
    }
    await renderKanbanContent();
  },
  refreshInterval: 30000
});

async function renderKanbanContent() {
  const board = await fetchBoard();
  if (!board) return;
  // Render columns
  const cols = {today:'col-today',doing:'col-doing',done:'col-done',overdue:'col-overdue'};
  for (const k in cols) {
    const col = document.getElementById(cols[k]); if (!col) continue;
    const cards = board.columns[k] || [];
    col.innerHTML = cards.map(function(t) {
      const color = localStorage.getItem('card_color_'+t.id) || '';
      const cls = 'goal-card' + (t.status==='done'?' done':'') + (t.goal_type?' type-'+t.goal_type:'') + (color?' color-'+color:'');
      const meta = t.goal_title ? '<div class="card-meta">'+escapeHtml(t.goal_title)+'</div>' : '';
      const actions = '<span class="card-actions">' +
        '<button class="btn-split" title="Color" onclick="event.stopPropagation();cycleCardColor(event,'+t.id+')">🎨</button>' +
        '<button class="btn-split" title="Split" onclick="event.stopPropagation();splitTask('+t.id+')">✂</button>' +
        '</span>';
      return '<div class="'+cls+'" draggable="true" data-task-id="'+t.id+'" data-status="'+t.status+'" ondragstart="dragTask(event,'+t.id+',&quot;'+t.status+'&quot;)" onclick="editCard(event,'+t.id+')">'+actions+'<div class="card-title">'+escapeHtml(t.title)+'</div>'+meta+'</div>';
    }).join('');
  }
}

// Kanban card interactions
var CARD_COLORS = ['blue','green','orange','purple','gold','red','teal','pink'];
function cycleCardColor(e, id) { e.stopPropagation(); var cur = localStorage.getItem('card_color_'+id) || ''; var idx = CARD_COLORS.indexOf(cur); localStorage.setItem('card_color_'+id, CARD_COLORS[(idx+1)%CARD_COLORS.length]); renderKanbanContent(); }
async function splitTask(id) { try { var r = await fetch('/api/tasks/'+id+'/split',{method:'POST'}); if(r.ok){showToast('Split!');renderKanbanContent();} else {showToast('AI not available');} } catch(e) {} }
function editCard(e, id) {
  var card = e.currentTarget;
  var titleEl = card.querySelector('.card-title');
  if (!titleEl || card.querySelector('input')) return;
  var inp = document.createElement('input');
  inp.className = 'card-edit-input'; inp.value = titleEl.textContent;
  inp.onblur = function() { saveCardTitle(id, inp.value, card, titleEl); };
  inp.onkeydown = function(ev) { if (ev.key==='Enter') { ev.preventDefault(); inp.blur(); } if (ev.key==='Escape') { titleEl.style.display=''; inp.remove(); } };
  titleEl.style.display = 'none'; card.insertBefore(inp, titleEl); inp.focus(); inp.select();
}
function saveCardTitle(id, newTitle, card, titleEl) {
  var inp = card.querySelector('input'); if (!inp) return;
  var title = inp.value.trim() || titleEl.textContent;
  inp.remove(); titleEl.style.display = ''; titleEl.textContent = title;
  fetch('/api/tasks/'+id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:title})}).then(function(){renderKanbanContent();}).catch(function(){});
}

// Drag and drop
var dragData = null;
function dragTask(e, taskId, status) { dragData = { id: taskId, from: status }; e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', String(taskId)); }
async function dragNewCard(e) {
  e.dataTransfer.effectAllowed = 'move'; e.dataTransfer.setData('text/plain', 'new');
  try {
    var gr = await fetch('/api/goals',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title:'New card',type:'long_term'})});
    if(gr.ok){ var goal = await gr.json(); var tr = await fetch('/api/tasks',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({goal_id:goal.id,title:'New card'})}); if(tr.ok){ var task = await tr.json(); dragData = { id: task.id, from: 'inbox', newCard: true }; } }
  } catch(e) {}
}
function onInboxDragEnd(e) {
  if (dragData && dragData.newCard && !dragData.consumed) { fetch('/api/tasks/'+dragData.id,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'skipped'})}).catch(function(){}); }
  dragData = null; renderInboxCard();
}
function renderInboxCard() {
  var s = document.getElementById('inbox-stack'); if(!s) return;
  s.innerHTML = '<div class="inbox-shadow"></div><div class="inbox-shadow"></div><div id="inbox-card" class="goal-card inbox-blank" draggable="true" ondragstart="dragNewCard(event)" ondragend="onInboxDragEnd(event)"><div class="card-title">New card</div></div>';
}
function allowDrop(e) { e.preventDefault(); }
async function dropTask(e, newStatus) {
  e.preventDefault(); if (!dragData) return;
  var taskId = dragData.id; dragData.consumed = true;
  try {
    var dropPayload = {status: newStatus};
    if (newStatus === 'pending' || newStatus === 'doing') { var d = new Date(); dropPayload.date = d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
    await fetch('/api/tasks/'+taskId,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(dropPayload)});
    renderKanbanContent(); PanelSystem.refreshPanel('stats'); PanelSystem.refreshPanel('goals');
  } catch(err) { console.warn('Drop failed:', err); }
  dragData = null;
}
async function trashTask(e) {
  e.preventDefault(); if (!dragData) return;
  dragData.consumed = true; var taskId = dragData.id;
  try { await fetch('/api/tasks/'+taskId,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:'skipped'})}); showToast('Trashed!'); renderKanbanContent(); } catch(err) { console.warn('Trash failed:', err); }
  dragData = null;
}
async function captureThoughtKb() {
  var inp = document.getElementById('capture-input-kb'); if (!inp || !inp.value.trim()) return;
  try { var r = await fetch('/api/classify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({raw_text:inp.value.trim()})}); if(r.ok){inp.value='';showToast('Tamed!');renderKanbanContent();} else {showToast('AI failed');} } catch(e) { showToast('Failed'); }
}

/* ═══════════════════════════════════════════════════════════
   PANEL: GOALS (zone-bl) — THE FIX FOR TODAY'S PROBLEM
   ═══════════════════════════════════════════════════════════ */
PanelSystem.register('goals', {
  zone: 'bl', title: 'Goals', icon: '🎯',
  render: async function(container) {
    const data = await fetchGoals();
    if (!data || !data.goals || data.goals.length === 0) {
      container.innerHTML = '<div class="empty-state">No goals yet!<br><br>Create one from the Kanban tab or click "+ Goal" in the Stats column.</div>';
      return;
    }

    const goals = data.goals.filter(g => !g.archived);
    if (goals.length === 0) {
      container.innerHTML = '<div class="empty-state">All goals archived. Create a new one!</div>';
      return;
    }

    container.innerHTML = goals.map(g => {
      const pct = g.progress_pct || 0;
      let fillClass = '';
      if (pct > 66) fillClass = 'high'; else if (pct < 25 && pct > 0) fillClass = 'low';
      const typeLabel = g.type.replace('_', ' ');
      const paused = g.paused ? ' paused' : '';
      const meta = [];
      if (g.target_days) meta.push('Target: ' + g.target_days + ' days');
      if (g.frequency && g.frequency !== 'daily') meta.push(g.frequency);

      return '<div class="goal-panel-card type-' + g.type + paused + '">' +
        '<div class="goal-panel-header">' +
          '<span class="goal-panel-title">' + escapeHtml(g.title) + '</span>' +
          '<span class="goal-panel-type">' + typeLabel + '</span>' +
        '</div>' +
        '<div class="goal-panel-progress">' +
          '<div class="progress-bar"><div class="progress-fill ' + fillClass + '" style="width:' + pct + '%"></div></div>' +
          '<span class="goal-panel-pct">' + pct + '%</span>' +
        '</div>' +
        (meta.length > 0 ? '<div class="goal-panel-meta">' + meta.join(' · ') + '</div>' : '') +
        '<div class="goal-panel-actions">' +
          '<button onclick="updateGoalProgress(' + g.id + ', prompt(\'Progress %? (0-100)\',\'' + pct + '\'))">Set Progress</button>' +
          '<button onclick="togglePauseGoal(' + g.id + ',' + (g.paused ? 1 : 0) + ')">' + (g.paused ? 'Resume' : 'Pause') + '</button>' +
          '<button class="danger" onclick="archiveGoal(' + g.id + ')">Archive</button>' +
        '</div>' +
      '</div>';
    }).join('') +
    '<div style="margin-top:8px;text-align:center;">' +
      '<button class="btn btn-sm" onclick="PanelSystem.activatePanel(\'bl\',\'goals\');showToast(\'Create a goal from the Kanban + Task button\')">+ New Goal</button>' +
    '</div>';
  }
});

// Goal action functions
async function updateGoalProgress(goalId, pctStr) {
  const pct = parseFloat(pctStr);
  if (isNaN(pct) || pct < 0 || pct > 100) return;
  try {
    await fetch('/api/goals/' + goalId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ progress_pct: pct }) });
    showToast('Progress updated to ' + pct + '%');
    PanelSystem.refreshPanel('goals');
  } catch(e) { showToast('Failed to update progress'); }
}
async function togglePauseGoal(goalId, currentPaused) {
  try {
    await fetch('/api/goals/' + goalId, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ paused: currentPaused ? false : true }) });
    showToast(currentPaused ? 'Goal resumed!' : 'Goal paused');
    PanelSystem.refreshPanel('goals');
  } catch(e) { showToast('Failed'); }
}
async function archiveGoal(goalId) {
  if (!confirm('Archive this goal? It will be hidden but not deleted.')) return;
  try {
    await fetch('/api/goals/' + goalId, { method: 'DELETE' });
    showToast('Goal archived');
    PanelSystem.refreshPanel('goals');
    renderKanbanContent();
  } catch(e) { showToast('Failed to archive'); }
}

/* ═══════════════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════════════ */
function showToast(msg, undoCallback) {
  var c = document.getElementById('toast-container'); if(!c) return;
  var t = document.createElement('div'); t.className='toast';
  t.innerHTML = '<span>' + escapeHtml(msg) + '</span>';
  if (undoCallback) { var btn = document.createElement('button'); btn.className = 'toast-btn'; btn.textContent = 'Undo'; btn.onclick = function() { undoCallback(); t.remove(); }; t.appendChild(btn); }
  c.appendChild(t);
  setTimeout(function(){ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(function(){t.remove();},300); }, 4000);
}

/* ═══════════════════════════════════════════════════════════
   SUNRISE SEQUENCE
   ═══════════════════════════════════════════════════════════ */
const SUNRISE_DURATION = 60000;
const SUNRISE_GOLD = { r: 255, g: 215, b: 0 };

function startSunriseSequence() {
  if (sunriseActive) return;
  sunriseActive = true;
  const btn = document.getElementById('sunrise-btn');
  if (btn) { btn.disabled = true; }
  document.body.classList.add('sunrise-active');

  let remainingSeconds = Math.ceil(SUNRISE_DURATION / 1000);
  if (btn) btn.textContent = '☀️ ' + remainingSeconds + 's';
  const countdownId = setInterval(() => {
    remainingSeconds--;
    if (remainingSeconds > 0 && btn) { btn.textContent = '☀️ ' + remainingSeconds + 's'; }
  }, 1000);

  function cleanupSunrise() {
    clearInterval(countdownId);
    sunriseActive = false;
    if (btn) { btn.disabled = false; btn.textContent = '☀️ Start Sunrise'; }
    document.body.classList.remove('sunrise-active');
    fetchTimeColor();
  }

  const startBg = { ...bgColor };
  startColorLerp(startBg, SUNRISE_GOLD, SUNRISE_DURATION);

  try {
    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioCtx();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    oscillator.type = 'sine';
    oscillator.frequency.setValueAtTime(440, audioCtx.currentTime);
    oscillator.frequency.linearRampToValueAtTime(880, audioCtx.currentTime + SUNRISE_DURATION / 1000);
    const fadeInEnd = audioCtx.currentTime + 2;
    const fadeOutStart = audioCtx.currentTime + (SUNRISE_DURATION / 1000) - 5;
    const endTime = audioCtx.currentTime + SUNRISE_DURATION / 1000;
    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
    gainNode.gain.linearRampToValueAtTime(0.15, fadeInEnd);
    gainNode.gain.setValueAtTime(0.15, fadeOutStart);
    gainNode.gain.linearRampToValueAtTime(0, endTime);
    oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);
    oscillator.start(audioCtx.currentTime); oscillator.stop(endTime);
    setTimeout(() => { cleanupSunrise(); audioCtx.close().catch(() => {}); }, SUNRISE_DURATION + 200);
  } catch (err) {
    console.warn('Web Audio not available:', err);
    setTimeout(cleanupSunrise, SUNRISE_DURATION + 200);
  }
}

/* ═══════════════════════════════════════════════════════════
   AUTO-SUNRISE SCHEDULER
   ═══════════════════════════════════════════════════════════ */
let autoSunrisePollId = null;
let autoSunriseLocalEnabled = false;
let autoSunriseLocalTime = '07:00';

async function loadScheduleFromServer(toggleEl, timeEl) {
  try {
    const res = await fetch('/api/sunrise/schedule'); if (!res.ok) return;
    const data = await res.json();
    if (toggleEl) toggleEl.checked = data.enabled;
    if (timeEl) timeEl.value = data.time;
    autoSunriseLocalEnabled = data.enabled; autoSunriseLocalTime = data.time;
    saveAutoSunriseLocal();
  } catch (err) { loadAutoSunriseLocal(toggleEl, timeEl); }
}
function loadAutoSunriseLocal(toggleEl, timeEl) {
  try {
    const saved = localStorage.getItem('horizon_auto_sunrise');
    if (saved) { const p = JSON.parse(saved); if (typeof p.enabled === 'boolean') { autoSunriseLocalEnabled = p.enabled; if (toggleEl) toggleEl.checked = p.enabled; } if (typeof p.time === 'string') { autoSunriseLocalTime = p.time; if (timeEl) timeEl.value = p.time; } }
  } catch(e) {}
}
function saveAutoSunriseLocal() { try { localStorage.setItem('horizon_auto_sunrise', JSON.stringify({enabled:autoSunriseLocalEnabled, time:autoSunriseLocalTime})); } catch(e) {} }
async function saveScheduleToServer(enabled, time) { try { await fetch('/api/sunrise/schedule', {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({enabled,time})}); } catch(e) {} }

async function checkSunriseTrigger() {
  try { const res = await fetch('/api/sunrise/schedule'); if(res.ok){ const data = await res.json(); if(data.sunrise_triggered) startSunriseSequence(); } } catch(e) { checkLocalSunriseTime(); }
}
function checkLocalSunriseTime() {
  if (!autoSunriseLocalEnabled) return;
  const now = new Date(); const cm = now.getHours()*60+now.getMinutes();
  const [h,m] = autoSunriseLocalTime.split(':').map(Number); const tm = h*60+m;
  if (cm === tm) { const tk = now.toDateString(); const lt = localStorage.getItem('horizon_last_sunrise_date'); if(lt!==tk){ try{localStorage.setItem('horizon_last_sunrise_date',tk);}catch(e){} startSunriseSequence(); } }
}
function startAutoSunrisePolling() {
  loadScheduleFromServer(); autoSunrisePollId = setInterval(checkSunriseTrigger, 15000); setInterval(checkLocalSunriseTime, 30000);
}

/* ═══════════════════════════════════════════════════════════
   ACTIVITY TRACKING
   ═══════════════════════════════════════════════════════════ */
const hasJsApi = typeof pywebview !== 'undefined' && pywebview.api;
let activityPollId = null, activitySSE = null;
window._lastActivity = null;

async function fetchActivityNow() {
  try {
    const res = await fetch('/api/activity/now'); if (!res.ok) return;
    const data = await res.json();
    window._lastActivity = data;
    if (window._questUpdateActivity) window._questUpdateActivity();
    document.getElementById('activity-indicator-inline');
  } catch(e) {}
}
function startActivityPolling() { if(activityPollId) clearInterval(activityPollId); activityPollId = setInterval(fetchActivityNow, 30000); fetchActivityNow(); }
function startActivityTracking() {
  if (hasJsApi) { console.log('PyWebView bridge detected'); startActivityPolling(); return; }
  try {
    activitySSE = new EventSource('/api/activity/stream');
    activitySSE.addEventListener('activity', (e) => {
      try { const data = JSON.parse(e.data); window._lastActivity = data; if (window._questUpdateActivity) window._questUpdateActivity(); } catch(err) {}
    });
    activitySSE.addEventListener('error', () => { if(activitySSE){activitySSE.close();activitySSE=null;} startActivityPolling(); });
  } catch(err) { startActivityPolling(); }
  setInterval(() => { PanelSystem.refreshPanel('stats'); }, 30000);

  // Feed SSE — live updates when n8n sends data
  try {
    const feedSSE = new EventSource('/api/feed/stream');
    feedSSE.addEventListener('feed_item', () => { PanelSystem.refreshPanel('feed'); });
    feedSSE.addEventListener('feed_fetch_started', () => { PanelSystem.refreshPanel('feed'); });
  } catch(err) {}
}
